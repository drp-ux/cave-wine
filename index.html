  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #161c2e; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

<body>
  <div id="root">
    <!-- Shown until React mounts -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
      <div style="font-size:48px">🍷</div>
      <div style="color:#5a6480;font-size:13px;font-family:system-ui">Loading Cave...</div>
    </div>
  </div>
  <div id="js-error" style="display:none;position:fixed;inset:0;background:#1a0808;padding:24px;overflow:auto;z-index:999">
    <div style="color:#ff6b6b;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all"></div>
  </div>

  <!-- Use cdnjs - more reliable than unpkg for production -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script>
    // Show any JS errors visibly on screen
    window.addEventListener('error', function(e) {
      var el = document.getElementById('js-error');
      el.style.display = 'block';
      el.querySelector('div').textContent += 'ERROR: ' + e.message + '\nFile: ' + e.filename + ' line ' + e.lineno + '\n\n';
    });
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('js-error');
      el.style.display = 'block';
      el.querySelector('div').textContent += 'PROMISE ERROR: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '\n\n';
    });

    // localStorage storage adapter
    window.storage = {
      list: async function(prefix) {
        var keys = Object.keys(localStorage).filter(function(k){ return k.startsWith(prefix); });
        return { keys: keys };
      },
      get: async function(key) {
        var val = localStorage.getItem(key);
        if (val === null) throw new Error('Key not found: ' + key);
        return { value: val };
      },
      set: async function(key, value) {
        localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
        return { key: key, value: value };
      },
      delete: async function(key) {
        localStorage.removeItem(key);
        return { key: key, deleted: true };
      }
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
  </script>

  <script type="text/babel" data-presets="react,env">
const { useState, useEffect } = React;

// ─── HELPERS ─────────────────────────────────────────────────────────────────

const pillCls = (t = '') => {
  const s = t.toLowerCase();
  if (s === 'red') return 'pill pr';
  if (s === 'white') return 'pill pw';
  if (s === 'sparkling') return 'pill ps';
  if (s === 'rosé' || s === 'rose') return 'pill prs';
  return 'pill pw';
};

const statusCls = (s = '') => {
  const v = s.toLowerCase();
  if (v.includes('now') || v.includes('soon') || (v.includes('peak') && !v.includes('past'))) return 'bdrink';
  if (v.includes('past')) return 'bdanger';
  return 'bhold';
};

const wineEmoji = (t = '') => ({ red: '🍷', white: '🍾', sparkling: '🥂', rosé: '🌸', dessert: '🍯', fortified: '🥃' }[t.toLowerCase()] || '🍷');

const avg = w => ((w.retailPriceLow || 0) + (w.retailPriceHigh || 0)) / 2;

function compressImage(dataUrl, maxDim = 1400) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function makeThumbnail(dataUrl, size = 140) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const s = Math.min(size / img.width, size / img.height);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * s);
      c.height = Math.round(img.height * s);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.75));
    };
    img.onerror = () => resolve('');
    img.src = dataUrl;
  });
}

// ── OCR ───────────────────────────────────────────────────────────────────────
async function loadTesseract() {
  if (window.Tesseract) return window.Tesseract;
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = () => resolve(window.Tesseract);
    s.onerror = () => reject(new Error('Could not load OCR'));
    document.head.appendChild(s);
  });
}

async function runOCR(imageDataUrl) {
  const T = await loadTesseract();
  const worker = await T.createWorker('eng', 1, {
    workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
    corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd-lstm.wasm.js',
    logger: () => {}
  });
  try {
    const { data: { text } } = await worker.recognize(imageDataUrl);
    return text.trim();
  } finally {
    await worker.terminate();
  }
}

// ── API (with stored key injection) ───────────────────────────────────────────
async function callAPI(prompt) {
  const apiKey = localStorage.getItem('cave_api_key') || '';
  if (!apiKey) throw new Error('No API key — tap ⚙ to add your Anthropic key.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const raw = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${raw.slice(0, 200)}`);
  let data;
  try { data = JSON.parse(raw); } catch(e) { throw new Error(`Bad response: ${raw.slice(0, 100)}`); }
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const txt = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
  if (!txt) throw new Error('Empty response from API');
  return txt;
}

function parseJSON(txt) {
  const fence = txt.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) return JSON.parse(fence[1].trim());
  const s = txt.indexOf('{'), e = txt.lastIndexOf('}');
  if (s !== -1 && e > s) return JSON.parse(txt.slice(s, e + 1));
  throw new Error(`No JSON found in: ${txt.slice(0, 120)}`);
}

async function identifyWine(labelText) {
  const prompt = `You are an expert sommelier. Text extracted from a wine label: "${labelText.slice(0, 600)}"

Reply with ONLY a raw JSON object, nothing else before or after it.

{"identified":true,"confidence":"high","producer":"producer name","wineName":"wine name","vintage":"2021","region":"region, country","appellation":"appellation","grapeVarieties":["Nebbiolo"],"wineType":"red","style":"Full-bodied","retailPriceLow":45,"retailPriceHigh":65,"priceNote":"varies","tastingNotes":{"nose":"aromas","palate":"flavors","finish":"finish"},"drinkingWindow":{"status":"hold","start":"2027","end":"2038","recommendation":"Hold 3-5 more years"},"cellaring":{"shouldCellar":true,"yearsToHold":"3-5 years","storageNotes":"55F, 70% humidity"},"servingTemp":"62-65F","decantingAdvice":"Decant 2 hours"}

wineType must be one of: red, white, rose, sparkling, dessert, fortified. Current year 2026. Realistic US retail prices.
If cannot identify: {"identified":false,"reason":"explanation"}`;
  return parseJSON(await callAPI(prompt));
}

async function getRecommendations(description, cellar) {
  const list = cellar.map((w, i) =>
    `${i+1}. ${w.producer} ${w.wineName} ${w.vintage} - ${w.wineType} - Status: ${w.drinkingWindow ? w.drinkingWindow.status : 'unknown'} - ${w.bottles} bottles`
  ).join('\n');
  const prompt = `You are a sommelier. Host says: "${description}"\n\nTheir cellar:\n${list}\n\nRecommend 1-3 wines from the list. Prioritize drink-now/soon/peak status. Reply with ONLY a JSON array:\n[{"index":1,"reason":"why this wine"}]\n\nIf none are ready to drink, return [].`;
  const txt = await callAPI(prompt);
  const m = txt.match(/\[[\s\S]*\]/);
  if (!m) return [];
  return JSON.parse(m[0]);
}

// ── Cave Component ────────────────────────────────────────────────────────────
// ─── COMPONENT ────────────────────────────────────────────────────────────────

function Cave() {
  const [view, setView] = useState('home');
  const [cellar, setCellar] = useState([]);
  const [selId, setSelId] = useState(null);
  const [pending, setPending] = useState(null);
  const [pendingImg, setPendingImg] = useState(null);
  const [pendingQty, setPendingQty] = useState(1);
  const [scanText, setScanText] = useState('');
  const [manual, setManual] = useState(false);
  const [loading, setLoading] = useState(false);
  const [loadMsg, setLoadMsg] = useState('');
  const [error, setError] = useState('');
  const [logAction, setLogAction] = useState('');
  const [logNotes, setLogNotes] = useState('');
  const [logRating, setLogRating] = useState(0);
  const [filterType, setFilterType] = useState('all');
  const [sortBy, setSortBy] = useState('type');
  const [concText, setConcText] = useState('');
  const [recs, setRecs] = useState(null);
  const [notesDraft, setNotesDraft] = useState('');
  const [editNotes, setEditNotes] = useState(false);

  const sel = cellar.find(w => w.id === selId);

  const stats = {
    bottles: cellar.reduce((s, w) => s + (w.bottles || 0), 0),
    value: Math.round(cellar.reduce((s, w) => s + (w.bottles || 0) * avg(w), 0)),
    ready: cellar.filter(w => statusCls(w.drinkingWindow?.status || '') === 'bdrink').length
  };

  useEffect(() => { loadCellar(); }, []);

  async function loadCellar() {
    try {
      const res = await window.storage.list('cave:');
      if (!res?.keys?.length) return;
      const wines = [];
      for (const key of res.keys) {
        try {
          const r = await window.storage.get(key);
          if (r) wines.push(JSON.parse(r.value));
        } catch {}
      }
      wines.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
      setCellar(wines);
    } catch {}
  }

  async function saveWine(wine) {
    await window.storage.set(`cave:${wine.id}`, JSON.stringify(wine));
    await loadCellar();
  }

  async function removeWine(id) {
    await window.storage.delete(`cave:${id}`);
    await loadCellar();
  }

  function goScan() {
    setManual(false); setScanText(''); setError('');
    setPendingImg(null); setPending(null);
    setView('scan');
  }

  async function handlePhoto(e) {
    const file = e.target.files?.[0];
    e.target.value = '';
    if (!file) return;
    setError('');
    const reader = new FileReader();
    reader.onload = async () => {
      const compressed = await compressImage(reader.result);
      setPendingImg(compressed);
      setView('scanning');
      setLoadMsg('Reading label…');
      setLoading(true);
      try {
        const ocrText = await runOCR(compressed);
        if (!ocrText || ocrText.length < 4) throw new Error('OCR returned too little text');
        setScanText(ocrText);
        setLoadMsg('Identifying wine…');
        const wine = await identifyWine(ocrText);
        if (!wine.identified) {
          setError(wine.reason || 'Could not identify — try typing the label text below.');
          setManual(true); setView('scan');
        } else {
          setPending(wine); setPendingQty(1); setView('confirm');
        }
      } catch (err) {
        setError('OCR could not read the label — please type what you see below.');
        setManual(true); setView('scan');
      } finally {
        setLoading(false);
      }
    };
    reader.readAsDataURL(file);
  }

  async function handleManualIdentify() {
    if (!scanText.trim()) return;
    setLoading(true); setError('');
    setView('scanning'); setLoadMsg('Identifying wine…');
    try {
      const wine = await identifyWine(scanText);
      if (!wine.identified) {
        setError(wine.reason || 'Could not identify. Add more label details.');
        setView('scan');
      } else {
        setPending(wine); setPendingQty(1); setView('confirm');
      }
    } catch (err) {
      setError(err.message); setView('scan');
    } finally {
      setLoading(false);
    }
  }

  async function confirmAdd() {
    if (!pending) return;
    const thumb = pendingImg ? await makeThumbnail(pendingImg) : '';
    const existing = cellar.find(w =>
      w.producer === pending.producer &&
      w.wineName === pending.wineName &&
      w.vintage === pending.vintage
    );
    if (existing) {
      await saveWine({ ...existing, bottles: (existing.bottles || 0) + pendingQty });
    } else {
      const id = Date.now().toString();
      await saveWine({ id, ...pending, bottles: pendingQty, myNotes: '', rating: 0, image: thumb, addedAt: Date.now(), drinkLog: [] });
    }
    setPending(null); setPendingImg(null); setScanText(''); setManual(false);
    setView('home');
  }

  async function confirmLog() {
    if (!sel) return;
    if (logAction === 'delete') {
      await removeWine(sel.id);
      setSelId(null); setLogAction(''); setView('cellar');
      return;
    }
    const entry = { date: new Date().toLocaleDateString(), type: logAction, notes: logNotes, rating: logRating };
    const updated = {
      ...sel,
      bottles: Math.max(0, (sel.bottles || 0) - 1),
      drinkLog: [entry, ...(sel.drinkLog || [])]
    };
    await saveWine(updated);
    setLogAction(''); setLogNotes(''); setLogRating(0);
    setView('detail');
  }

  async function adjustQty(delta) {
    if (!sel) return;
    await saveWine({ ...sel, bottles: Math.max(0, (sel.bottles || 0) + delta) });
  }

  async function saveMyNotes() {
    if (!sel) return;
    await saveWine({ ...sel, myNotes: notesDraft });
    setEditNotes(false);
  }

  async function runConcierge() {
    if (!concText.trim() || cellar.length === 0) return;
    setLoading(true); setError(''); setRecs(null);
    try {
      const idxs = await getRecommendations(concText, cellar);
      const matched = idxs
        .map(r => ({ wine: cellar[r.index - 1], reason: r.reason }))
        .filter(r => r.wine);
      setRecs(matched);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }

  const filteredCellar = cellar
    .filter(w => filterType === 'all' || (w.wineType || '').toLowerCase() === filterType)
    .sort((a, b) => {
      if (sortBy === 'type') return (a.wineType || '').localeCompare(b.wineType || '');
      if (sortBy === 'varietal') return ((a.grapeVarieties || [])[0] || '').localeCompare((b.grapeVarieties || [])[0] || '');
      if (sortBy === 'price↑') return avg(a) - avg(b);
      if (sortBy === 'price↓') return avg(b) - avg(a);
      if (sortBy === 'drink') return (a.drinkingWindow?.start || '9999').localeCompare(b.drinkingWindow?.start || '9999');
      return 0;
    });

  function Nav({ cur }) {
    return (
      <div className="nav">
        {[['home', '⌂', 'Home'], ['cellar', '▤', 'Cellar'], ['concierge', '✦', 'Concierge']].map(([v, ic, lb]) => (
          <button key={v} className={`nb ${cur === v ? 'nbon' : ''}`}
            onClick={() => { if (v === 'concierge') { setRecs(null); } setView(v); }}>
            <span style={{ fontSize: 16 }}>{ic}</span>
            {lb}
            <span className={`ndot ${cur === v ? 'ndoton' : ''}`} />
          </button>
        ))}
      </div>
    );
  }

  // ── HOME ────────────────────────────────────────────────────────────────────
  if (view === 'home') return (
    <div style={{ background: '#161c2e', minHeight: '100vh', display: 'flex', flexDirection: 'column', maxWidth: 440, margin: '0 auto' }}>
      <style>{CSS}</style>
      <div style={{ padding: '20px 16px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ color: '#5a6480', fontSize: 10, letterSpacing: '.12em', marginBottom: 2 }}>YOUR</div>
          <div className="di" style={{ color: '#f0ead8', fontSize: 28 }}>Cave</div>
        </div>
        <div style={{ background: '#252d4a', border: '0.5px solid #3a4468', borderRadius: '50%', width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#c4a44a', fontSize: 14, fontWeight: 600 }}>A</div>
      </div>

      <div style={{ padding: '0 16px 14px', display: 'flex', gap: 8 }}>
        {[
          { label: 'BOTTLES', val: stats.bottles, color: '#f0ead8' },
          { label: 'VALUE', val: stats.value > 0 ? `$${stats.value.toLocaleString()}` : '—', color: '#c4a44a' },
          { label: 'READY', val: stats.ready, color: '#4a9e6a' }
        ].map(s => (
          <div key={s.label} className="card" style={{ flex: 1, textAlign: 'center', padding: 12 }}>
            <div style={{ color: '#5a6480', fontSize: 10, letterSpacing: '.06em', marginBottom: 4 }}>{s.label}</div>
            <div className="df" style={{ color: s.color, fontSize: 22 }}>{s.val}</div>

      </div>

      <div style={{ padding: '0 16px', flex: 1, overflowY: 'auto' }}>

            <div style={{ fontSize: 40, marginBottom: 14 }}>🍷</div>

            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ color: '#f0ead8', fontSize: 13, fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{w.producer}</div>
              <div style={{ color: '#5a6480', fontSize: 11, marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{w.wineName} {w.vintage} · <span style={{ color: '#8a96b8' }}>{w.bottles} btl</span></div>

            <div style={{ textAlign: 'right', flexShrink: 0 }}>
              <div style={{ color: '#c4a44a', fontSize: 13 }}>${Math.round(avg(w))}</div>

      </div>

      <div style={{ padding: '10px 16px' }}>
        <button className="btn" onClick={goScan}>+ Scan new bottle</button>
      </div>
      <Nav cur="home" />
    </div>
  );

  // ── SCAN ─────────────────────────────────────────────────────────────────────
  if (view === 'scan') return (
    <div style={{ background: '#161c2e', minHeight: '100vh', display: 'flex', flexDirection: 'column', maxWidth: 440, margin: '0 auto' }}>
      <style>{CSS}</style>
      <div style={{ padding: '18px 16px 10px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <button className="back" onClick={() => setView('home')}>←</button>
        <span className="di" style={{ color: '#f0ead8', fontSize: 18 }}>Add to cave</span>
      </div>

      {!manual ? (
        <>
          <div style={{ margin: '0 16px', background: '#1e2640', borderRadius: 16, border: '0.5px solid #2d3654', minHeight: 200, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden' }}>
            {pendingImg
              ? <img src={pendingImg} style={{ width: '100%', maxHeight: 220, objectFit: 'contain' }} />

                  const [v, h] = pos.split('-');
                  return <div key={pos} style={{ position: 'absolute', [v]: 16, [h]: 16, width: 18, height: 18, borderTop: v === 'top' ? '2px solid #c4a44a' : 'none', borderBottom: v === 'bottom' ? '2px solid #c4a44a' : 'none', borderLeft: h === 'left' ? '2px solid #c4a44a' : 'none', borderRight: h === 'right' ? '2px solid #c4a44a' : 'none', borderRadius: `${v === 'top' && h === 'left' ? '3px' : '0'} ${v === 'top' && h === 'right' ? '3px' : '0'} ${v === 'bottom' && h === 'right' ? '3px' : '0'} ${v === 'bottom' && h === 'left' ? '3px' : '0'}` }} />;
                })}
                <div style={{ fontSize: 32, marginBottom: 8 }}>📷</div>
                <div style={{ color: '#5a6480', fontSize: 12 }}>Point at the front label</div>
              </>

          {error && <div className="err" style={{ margin: '10px 16px 0' }}>{error}</div>}

          <div style={{ padding: '12px 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>

              <div className="btn" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>📷 Take photo</div>
              <input type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{ display: 'none' }} />
            </label>
            <label style={{ display: 'block', cursor: 'pointer' }}>
              <div className="gbtn" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, textAlign: 'center' }}>🖼 Choose from library</div>
              <input type="file" accept="image/*" onChange={handlePhoto} style={{ display: 'none' }} />
            </label>
            <button style={{ background: 'none', border: 'none', color: '#5a6480', fontSize: 12, cursor: 'pointer', marginTop: 4 }} onClick={() => { setManual(true); setError(''); }}>
              Type label manually →
            </button>
          </div>
        </>
      ) : (
        <div style={{ padding: '0 16px', flex: 1 }}>
          {pendingImg && <div style={{ borderRadius: 12, overflow: 'hidden', maxHeight: 150, marginBottom: 12 }}><img src={pendingImg} style={{ width: '100%', objectFit: 'contain', maxHeight: 150 }} /></div>}
          {error && <div className="err" style={{ marginBottom: 12 }}>{error}</div>}
          <div className="sec">TYPE WHAT'S ON THE LABEL</div>
          <textarea value={scanText} onChange={e => setScanText(e.target.value)}
            placeholder="e.g. Barolo 2021, Domenico Clerico, del Comune di Monforte d'Alba, Piedmont Italy"
            rows={4} style={{ marginBottom: 8 }} />
          <div style={{ color: '#5a6480', fontSize: 11, marginBottom: 12 }}>Include producer · wine name · vintage · region</div>
          <button className="btn" onClick={handleManualIdentify} disabled={!scanText.trim() || loading}>Identify wine</button>
          <button className="gbtn" style={{ marginTop: 8 }} onClick={() => { setManual(false); setError(''); }}>← Back to camera</button>
        </div>
      )}
      <Nav cur="" />
    </div>
  );

  // ── SCANNING ─────────────────────────────────────────────────────────────────
  if (view === 'scanning') return (
    <div style={{ background: '#161c2e', minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', maxWidth: 440, margin: '0 auto' }}>
      <style>{CSS}</style>
      <div style={{ fontSize: 44, marginBottom: 18 }}>🍷</div>
      <div className="di" style={{ color: '#8a96b8', fontSize: 22, marginBottom: 8 }}>{loadMsg}</div>
      <div style={{ color: '#5a6480', fontSize: 12, textAlign: 'center', lineHeight: 1.7 }}>
        {loadMsg.includes('Reading') ? 'Running OCR on the label…' : 'Consulting the sommelier…'}
      </div>
      <div style={{ width: 160, height: 2, background: '#1e2640', borderRadius: 2, overflow: 'hidden', marginTop: 28 }}>
        <div style={{ height: '100%', background: 'linear-gradient(90deg, #c4a44a, #e8c870)', borderRadius: 2, width: '65%' }} />
      </div>
    </div>
  );

  // ── CONFIRM ────────────────────────────────────────────────────────────────
  if (view === 'confirm' && pending) return (
    <div style={{ background: '#161c2e', minHeight: '100vh', display: 'flex', flexDirection: 'column', maxWidth: 440, margin: '0 auto' }}>
      <style>{CSS}</style>
      <div style={{ padding: '18px 16px 10px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <button className="back" onClick={() => setView('scan')}>←</button>
        <span className="di" style={{ color: '#f0ead8', fontSize: 18 }}>Confirm wine</span>
      </div>

      <div style={{ padding: '0 16px', flex: 1, overflowY: 'auto' }}>
        {pendingImg && (
          <div style={{ borderRadius: 12, overflow: 'hidden', maxHeight: 180, marginBottom: 12 }}>
            <img src={pendingImg} style={{ width: '100%', objectFit: 'contain', maxHeight: 180 }} />
          </div>
        )}

        <div className="card" style={{ marginBottom: 10 }}>
          <div style={{ color: '#5a6480', fontSize: 10, letterSpacing: '.1em', marginBottom: 2 }}>IDENTIFIED · {(pending.confidence || '').toUpperCase()}</div>
          <div style={{ color: '#5a6480', fontSize: 10, letterSpacing: '.1em', marginBottom: 3 }}>{(pending.producer || '').toUpperCase()}</div>
          <div className="di" style={{ color: '#f0ead8', fontSize: 22, lineHeight: 1.2, marginBottom: 6 }}>{pending.wineName}</div>
          <div style={{ color: '#8a96b8', fontSize: 12 }}>{pending.vintage}{pending.region ? ` · ${pending.region}` : ''}</div>
          {pending.appellation && <div style={{ color: '#5a6480', fontSize: 11, marginTop: 2 }}>{pending.appellation}</div>}
          <div style={{ marginTop: 8, display: 'flex', gap: 4, flexWrap: 'wrap' }}>
            {(pending.grapeVarieties || []).map(g => <span key={g} className={pillCls(pending.wineType)}>{g}</span>)}
          </div>
        </div>

        <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
          <div className="card" style={{ flex: 1, padding: 12 }}>
            <div className="sec" style={{ marginBottom: 4 }}>RETAIL</div>
            <div className="df" style={{ color: '#c4a44a', fontSize: 18 }}>${pending.retailPriceLow}–${pending.retailPriceHigh}</div>
          </div>
          <div className="card" style={{ flex: 1, padding: 12 }}>
            <div className="sec" style={{ marginBottom: 4 }}>DRINK</div>
            <div className="df" style={{ color: '#c47a2a', fontSize: 14, marginBottom: 4 }}>{pending.drinkingWindow?.start}–{pending.drinkingWindow?.end}</div>
            <div className={statusCls(pending.drinkingWindow?.status || '')}>{pending.drinkingWindow?.status}</div>
          </div>
        </div>

        <div className="card" style={{ marginBottom: 12 }}>
          <div className="sec">HOW MANY BOTTLES?</div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ color: '#8a96b8', fontSize: 13 }}>Bottles to add</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              <button className="qbtn" onClick={() => setPendingQty(q => Math.max(1, q - 1))}>−</button>
              <span className="df" style={{ color: '#f0ead8', fontSize: 26, minWidth: 28, textAlign: 'center' }}>{pendingQty}</span>
              <button className="qbtn" onClick={() => setPendingQty(q => q + 1)}>+</button>
            </div>
          </div>
          {cellar.some(w => w.producer === pending.producer && w.wineName === pending.wineName && w.vintage === pending.vintage) && (
            <div style={{ color: '#c4a44a', fontSize: 11, marginTop: 8 }}>⚠ Already in cave — count will be added to existing stock</div>
          )}
        </div>

        <button className="btn" onClick={confirmAdd}>Save {pendingQty} bottle{pendingQty !== 1 ? 's' : ''} to cave</button>
        <button className="gbtn" style={{ marginTop: 8 }} onClick={goScan}>Re-scan</button>
        <div style={{ height: 20 }} />
      </div>
      <Nav cur="" />
    </div>
  );

  // ── WINE DETAIL ─────────────────────────────────────────────────────────────
  if (view === 'detail' && sel) return (
    <div style={{ background: '#161c2e', minHeight: '100vh', display: 'flex', flexDirection: 'column', maxWidth: 440, margin: '0 auto' }}>
      <style>{CSS}</style>
      <div style={{ padding: '18px 16px 10px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button className="back" onClick={() => setView('cellar')}>←</button>
        <button style={{ background: 'none', border: 'none', color: '#c44a4a', fontSize: 12, cursor: 'pointer', letterSpacing: '.05em' }}

      </div>

      <div style={{ padding: '0 16px', flex: 1, overflowY: 'auto' }}>
        <div style={{ display: 'flex', gap: 14, marginBottom: 16, alignItems: 'flex-start' }}>
          <div style={{ width: 54, height: 74, borderRadius: 8, background: '#252d4a', border: '0.5px solid #3a4468', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28, flexShrink: 0, overflow: 'hidden' }}>
            {sel.image ? <img src={sel.image} style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : wineEmoji(sel.wineType)}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ color: '#5a6480', fontSize: 10, letterSpacing: '.1em', marginBottom: 2 }}>{(sel.producer || '').toUpperCase()}</div>
            <div className="di" style={{ color: '#f0ead8', fontSize: 20, lineHeight: 1.2, marginBottom: 4 }}>{sel.wineName}</div>
            <div style={{ color: '#8a96b8', fontSize: 11 }}>{sel.vintage}{sel.region ? ` · ${sel.region}` : ''}</div>
            {sel.appellation && <div style={{ color: '#5a6480', fontSize: 10, marginTop: 1 }}>{sel.appellation}</div>}
            <div style={{ marginTop: 6, display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {(sel.grapeVarieties || []).map(g => <span key={g} className={pillCls(sel.wineType)}>{g}</span>)}
            </div>
          </div>
        </div>

        {/* Inventory card */}
        <div className="card" style={{ marginBottom: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
            <div className="sec" style={{ marginBottom: 0 }}>INVENTORY</div>
            <button onClick={() => { setLogAction(''); setLogNotes(''); setLogRating(0); setView('log'); }}
              style={{ background: '#2a1010', border: '0.5px solid #4a2020', color: '#c44a4a', borderRadius: 8, padding: '4px 12px', fontSize: 11, cursor: 'pointer' }}>
              Log a bottle
            </button>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <span className="df" style={{ color: '#f0ead8', fontSize: 24 }}>{sel.bottles}</span>
              <span style={{ color: '#5a6480', fontSize: 13 }}> bottles remaining</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <button className="qbtn" onClick={() => adjustQty(-1)}>−</button>
              <button className="qbtn" onClick={() => adjustQty(1)}>+</button>
            </div>
          </div>
          {sel.drinkLog?.length > 0 && (
            <div style={{ marginTop: 10, borderTop: '0.5px solid #2d3654', paddingTop: 8 }}>
              <div style={{ color: '#5a6480', fontSize: 10, letterSpacing: '.08em', marginBottom: 4 }}>DRINK LOG</div>
              {sel.drinkLog.slice(0, 3).map((l, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
                  <span style={{ color: '#8a96b8', fontSize: 11 }}>
                    {l.date} — {l.type === 'drank' ? '🥂 Drank' : l.type === 'gave' ? '🎁 Gave away' : '💔 Lost'}
                  </span>
                  {l.rating > 0 && <span style={{ color: '#c4a44a', fontSize: 11 }}>{'★'.repeat(l.rating)}</span>}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Price + window */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
          <div className="card" style={{ flex: 1, padding: 12 }}>
            <div className="sec" style={{ marginBottom: 4 }}>RETAIL</div>
            <div className="df" style={{ color: '#c4a44a', fontSize: 18 }}>${sel.retailPriceLow}–${sel.retailPriceHigh}</div>
            {sel.priceNote && <div style={{ color: '#5a6480', fontSize: 10, marginTop: 2, fontStyle: 'italic' }}>{sel.priceNote}</div>}
          </div>
          <div className="card" style={{ flex: 1, padding: 12 }}>
            <div className="sec" style={{ marginBottom: 4 }}>DRINK</div>
            <div className="df" style={{ color: '#c47a2a', fontSize: 13, marginBottom: 5 }}>{sel.drinkingWindow?.start}–{sel.drinkingWindow?.end}</div>
            <div className={statusCls(sel.drinkingWindow?.status || '')}>{sel.drinkingWindow?.status || '—'}</div>
          </div>
        </div>

        {/* Tasting notes */}
        {sel.tastingNotes && (
          <div className="card" style={{ marginBottom: 10 }}>
            <div className="sec">TASTING NOTES</div>
            {[['Nose', sel.tastingNotes.nose], ['Palate', sel.tastingNotes.palate], ['Finish', sel.tastingNotes.finish]].map(([lbl, val]) => val ? (
              <div key={lbl} style={{ marginBottom: 8 }}>
                <div style={{ color: '#c4a44a', fontSize: 11, fontStyle: 'italic', marginBottom: 2 }}>{lbl}</div>
                <div style={{ color: '#8a96b8', fontSize: 12, lineHeight: 1.5 }}>{val}</div>
              </div>
            ) : null)}
          </div>
        )}

        {/* My notes */}
        <div className="card" style={{ marginBottom: 10 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <div className="sec" style={{ marginBottom: 0 }}>MY NOTES</div>
            {!editNotes && <button onClick={() => { setNotesDraft(sel.myNotes || ''); setEditNotes(true); }}
              style={{ background: 'none', border: 'none', color: '#c4a44a', fontSize: 11, cursor: 'pointer' }}>Edit</button>}
          </div>
          {editNotes ? (
            <>
              <textarea value={notesDraft} onChange={e => setNotesDraft(e.target.value)} rows={3}
                placeholder="Personal tasting notes, occasion, food pairing…" style={{ marginBottom: 8 }} />
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn" style={{ padding: 9 }} onClick={saveMyNotes}>Save</button>
                <button className="gbtn" style={{ padding: 9 }} onClick={() => setEditNotes(false)}>Cancel</button>
              </div>
            </>
          ) : (
            <div style={{ color: sel.myNotes ? '#8a96b8' : '#5a6480', fontSize: 13, fontStyle: sel.myNotes ? 'normal' : 'italic' }}>
              {sel.myNotes || 'Tap Edit to add personal notes…'}
            </div>
          )}
        </div>

        {/* Cellaring advice */}
        {sel.cellaring && (
          <div style={{ background: '#251608', border: '0.5px solid #3d2810', borderRadius: 14, padding: 14, marginBottom: 10 }}>
            <div style={{ color: '#c47a2a', fontSize: 10, letterSpacing: '.1em', marginBottom: 6 }}>CELLARING ADVICE</div>
            <div style={{ color: '#e8c4a0', fontSize: 12, lineHeight: 1.6 }}>
              {sel.cellaring.shouldCellar ? `Hold ${sel.cellaring.yearsToHold}. ` : 'Drink now — no need to cellar. '}
              {sel.cellaring.storageNotes}
            </div>
          </div>
        )}

        {/* Drinking window detail */}
        {sel.drinkingWindow?.recommendation && (
          <div className="card" style={{ marginBottom: 10 }}>
            <div className="sec">DRINKING WINDOW</div>
            <div style={{ color: '#8a96b8', fontSize: 12, lineHeight: 1.6 }}>{sel.drinkingWindow.recommendation}</div>
          </div>
        )}

        {/* Service */}
        {(sel.servingTemp || sel.decantingAdvice) && (
          <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
            {sel.servingTemp && (
              <div className="card" style={{ flex: 1, padding: 12 }}>
                <div className="sec" style={{ marginBottom: 4 }}>SERVE AT</div>
                <div className="df" style={{ color: '#f0ead8', fontSize: 16 }}>{sel.servingTemp}</div>
              </div>
            )}
            {sel.decantingAdvice && (
              <div className="card" style={{ flex: 2, padding: 12 }}>
                <div className="sec" style={{ marginBottom: 4 }}>DECANT</div>
                <div style={{ color: '#8a96b8', fontSize: 12, lineHeight: 1.4 }}>{sel.decantingAdvice}</div>
              </div>
            )}
          </div>
        )}
        <div style={{ height: 8 }} />
      </div>
      <Nav cur="cellar" />
    </div>
  );

  // ── LOG BOTTLE ──────────────────────────────────────────────────────────────
  if (view === 'log' && sel) return (
    <div style={{ background: '#161c2e', minHeight: '100vh', display: 'flex', flexDirection: 'column', maxWidth: 440, margin: '0 auto' }}>
      <style>{CSS}</style>
      <div style={{ padding: '18px 16px 6px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <button className="back" onClick={() => { setLogAction(''); setView('detail'); }}>←</button>
        <span className="di" style={{ color: '#f0ead8', fontSize: 18 }}>Log a bottle</span>
      </div>
      <div style={{ padding: '4px 16px 14px', color: '#8a96b8', fontSize: 13 }}>
        {sel.producer} {sel.wineName} {sel.vintage} · <span style={{ color: '#c4a44a' }}>{sel.bottles} remaining</span>
      </div>

      <div style={{ padding: '0 16px', flex: 1 }}>
        {!logAction ? (
          <>
            <div className="sec">WHAT HAPPENED TO THIS BOTTLE?</div>
            {[
              { key: 'drank', icon: '🥂', bg: '#0e2318', bdr: '#1a3d28', label: 'Drank it', sub: 'Logs date + removes from count' },
              { key: 'gave', icon: '🎁', bg: '#162038', bdr: '#1e3060', label: 'Gave away', sub: 'Gift or shared — removes from count' },
              { key: 'lost', icon: '💔', bg: '#251608', bdr: '#3d2810', label: 'Lost / broken / corked', sub: 'Removes from count, no drink log' },
              { key: 'delete', icon: '🗑', bg: '#2a1010', bdr: '#4a2020', label: 'Remove wine entirely', sub: 'Deletes all bottles from cave', danger: true },
            ].map(o => (
              <div key={o.key} className="lopt" style={{ borderColor: o.danger ? '#4a2020' : '#2d3654' }} onClick={() => setLogAction(o.key)}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: o.bg, border: `0.5px solid ${o.bdr}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{o.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: o.danger ? '#c44a4a' : '#f0ead8', fontSize: 13, fontWeight: 500 }}>{o.label}</div>
                  <div style={{ color: '#5a6480', fontSize: 11, marginTop: 1 }}>{o.sub}</div>
                </div>
                <div style={{ color: '#5a6480' }}>›</div>
              </div>
            ))}
          </>
        ) : logAction === 'delete' ? (
          <div className="card" style={{ textAlign: 'center', padding: 28 }}>
            <div style={{ fontSize: 32, marginBottom: 12 }}>🗑</div>
            <div className="di" style={{ color: '#f0ead8', fontSize: 20, marginBottom: 8 }}>Remove wine entirely?</div>
            <div style={{ color: '#8a96b8', fontSize: 13, marginBottom: 20, lineHeight: 1.5 }}>
              This removes all {sel.bottles} bottle{sel.bottles !== 1 ? 's' : ''} of <em>{sel.wineName}</em> from your cave. Cannot be undone.
            </div>
            <button className="dbtn" style={{ marginBottom: 8 }} onClick={confirmLog}>Yes, remove it</button>
            <button className="gbtn" onClick={() => setLogAction('')}>Cancel</button>
          </div>
        ) : (
          <div className="card">
            <div style={{ fontSize: 28, textAlign: 'center', marginBottom: 10 }}>{logAction === 'drank' ? '🥂' : '🎁'}</div>
            <div className="di" style={{ color: '#f0ead8', fontSize: 18, textAlign: 'center', marginBottom: 14 }}>
              {logAction === 'drank' ? 'Drank it' : 'Gave it away'}
            </div>
            {logAction === 'drank' && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ color: '#5a6480', fontSize: 10, letterSpacing: '.08em', marginBottom: 6 }}>RATE THIS BOTTLE</div>
                <div style={{ display: 'flex', gap: 6 }}>
                  {[1, 2, 3, 4, 5].map(n => (
                    <span key={n} className="star" style={{ color: n <= logRating ? '#c4a44a' : '#252d4a' }} onClick={() => setLogRating(n)}>★</span>
                  ))}
                </div>
              </div>
            )}
            <div style={{ marginBottom: 12 }}>
              <div style={{ color: '#5a6480', fontSize: 10, letterSpacing: '.08em', marginBottom: 6 }}>NOTES (OPTIONAL)</div>
              <textarea value={logNotes} onChange={e => setLogNotes(e.target.value)} rows={3}
                placeholder={logAction === 'drank' ? 'How was it? Food pairing, occasion…' : 'Who did you give it to?'} />
            </div>
            <button className="btn" onClick={confirmLog}>
              Confirm — {Math.max(0, (sel.bottles || 0) - 1)} bottle{Math.max(0, (sel.bottles || 0) - 1) !== 1 ? 's' : ''} remaining
            </button>
            <button className="gbtn" style={{ marginTop: 8 }} onClick={() => setLogAction('')}>Back</button>
          </div>
        )}
      </div>
      <Nav cur="cellar" />
    </div>
  );

  // ── CELLAR LIST ─────────────────────────────────────────────────────────────
  if (view === 'cellar') return (
    <div style={{ background: '#161c2e', minHeight: '100vh', display: 'flex', flexDirection: 'column', maxWidth: 440, margin: '0 auto' }}>
      <style>{CSS}</style>
      <div style={{ padding: '20px 16px 10px' }}>
        <div className="di" style={{ color: '#f0ead8', fontSize: 26, marginBottom: 12 }}>Cellar</div>

        {/* Type filter */}
        <div className="scrl" style={{ marginBottom: 8 }}>
          {[['all', `All (${cellar.length})`], ['red', `Red (${cellar.filter(w => w.wineType === 'red').length})`],
            ['white', `White (${cellar.filter(w => w.wineType === 'white').length})`],
            ['sparkling', `Sparkling (${cellar.filter(w => w.wineType === 'sparkling').length})`],
            ['rosé', `Rosé (${cellar.filter(w => w.wineType === 'rosé' || w.wineType === 'rose').length})`]
          ].map(([v, l]) => (
            <button key={v} className={`chip ${filterType === v ? 'chipon' : ''}`} onClick={() => setFilterType(v)}>{l}</button>
          ))}
        </div>

        {/* Sort */}
        <div className="scrl">
          <span style={{ color: '#5a6480', fontSize: 11, alignSelf: 'center', flexShrink: 0 }}>Sort:</span>
          {[['type', 'Type'], ['varietal', 'Varietal'], ['price↑', 'Price ↑'], ['price↓', 'Price ↓'], ['drink', 'Drink by']].map(([v, l]) => (
            <button key={v} className={`chip ${sortBy === v ? 'chipon' : ''}`} onClick={() => setSortBy(v)}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{ padding: '0 16px', flex: 1, overflowY: 'auto' }}>
        {filteredCellar.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '48px 0', color: '#5a6480' }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🍷</div>
            <div className="di" style={{ color: '#8a96b8', fontSize: 18 }}>No wines here yet</div>
          </div>
        ) : filteredCellar.map(w => (
          <div key={w.id}>
            <div className="row" onClick={() => { setSelId(w.id); setView('detail'); }}>
              <div style={{ width: 34, height: 46, borderRadius: 5, background: '#252d4a', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, flexShrink: 0, overflow: 'hidden' }}>
                {w.image ? <img src={w.image} style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: 4 }} /> : wineEmoji(w.wineType)}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ color: '#f0ead8', fontSize: 13, fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{w.producer}</div>
                <div style={{ color: '#5a6480', fontSize: 11, marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{w.wineName} {w.vintage}</div>
                <div style={{ marginTop: 3, display: 'flex', gap: 4, alignItems: 'center' }}>
                  <span style={{ color: '#c4a44a', fontSize: 11 }}>{w.bottles} btl</span>
                  <span style={{ color: '#3a4468' }}>·</span>
                  {(w.grapeVarieties || []).slice(0, 1).map(g => <span key={g} className={pillCls(w.wineType)}>{g}</span>)}
                </div>
              </div>
              <div style={{ textAlign: 'right', flexShrink: 0 }}>
                <div style={{ color: '#c4a44a', fontSize: 13 }}>${Math.round(avg(w))}</div>
                <div className={statusCls(w.drinkingWindow?.status || '')} style={{ marginTop: 4 }}>{w.drinkingWindow?.status || '—'}</div>
              </div>
            </div>
            {/* Quick actions */}
            <div style={{ display: 'flex', gap: 6, padding: '4px 0 8px', marginLeft: 44 }}>
              {[
                { lbl: '🥂 Drank', action: 'drank', bg: '#0e2318', bdr: '#1a3d28', col: '#4a9e6a' },
                { lbl: '🎁 Gave', action: 'gave', bg: '#162038', bdr: '#1e3060', col: '#7ab0e8' },
                { lbl: '🗑', action: 'delete', bg: '#2a1010', bdr: '#4a2020', col: '#c44a4a' },
              ].map(a => (
                <button key={a.action}
                  style={{ background: a.bg, border: `0.5px solid ${a.bdr}`, color: a.col, borderRadius: 8, padding: '4px 10px', fontSize: 11, cursor: 'pointer' }}
                  onClick={e => { e.stopPropagation(); setSelId(w.id); setLogAction(a.action); setLogNotes(''); setLogRating(0); setView('log'); }}>
                  {a.lbl}
                </button>
              ))}
            </div>
          </div>
        ))}
        <div style={{ height: 8 }} />
      </div>

      <div style={{ padding: '8px 16px' }}>
        <button className="btn" onClick={goScan}>+ Scan new bottle</button>
      </div>
      <Nav cur="cellar" />
    </div>
  );

  // ── CONCIERGE ───────────────────────────────────────────────────────────────
  if (view === 'concierge') return (
    <div style={{ background: '#161c2e', minHeight: '100vh', display: 'flex', flexDirection: 'column', maxWidth: 440, margin: '0 auto' }}>
      <style>{CSS}</style>
      <div style={{ padding: '20px 16px 12px' }}>
        <div className="di" style={{ color: '#f0ead8', fontSize: 26, marginBottom: 3 }}>Concierge</div>
        <div style={{ color: '#5a6480', fontSize: 13 }}>Tell me about your evening</div>
      </div>

      <div style={{ padding: '0 16px', flex: 1, overflowY: 'auto' }}>
        <div className="card" style={{ marginBottom: 12 }}>
          <div className="sec">WHAT'S HAPPENING TONIGHT?</div>
          <textarea value={concText} onChange={e => { setConcText(e.target.value); setRecs(null); }} rows={4}
            placeholder="e.g. Grilling portobello mushrooms for 4 guests, two prefer bold reds, one likes lighter wines, I'd like to open two bottles…" style={{ marginBottom: 10 }} />
          <button className="btn" onClick={runConcierge} disabled={loading || !concText.trim() || cellar.length === 0}>
            {loading ? 'Consulting the sommelier…' : 'Get recommendation'}
          </button>
          {cellar.length === 0 && <div style={{ color: '#5a6480', fontSize: 11, textAlign: 'center', marginTop: 8 }}>Add wines to your cave first</div>}
        </div>

        {error && <div className="err" style={{ marginBottom: 12 }}>{error}</div>}

        {recs !== null && (
          <div className="card">
            <div className="sec">FROM YOUR CAVE</div>
            {recs.length === 0 ? (
              <div style={{ color: '#8a96b8', fontSize: 13, fontStyle: 'italic', lineHeight: 1.6 }}>
                No wines in your cave are ready to drink right now. Check back when your "hold" wines enter their drinking window.
              </div>
            ) : recs.map(({ wine: w, reason }, i) => w && (
              <div key={i} onClick={() => { setSelId(w.id); setView('detail'); }}
                style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 12px', background: i === 0 ? '#252d4a' : '#1a2236', borderRadius: 10, border: `0.5px solid ${i === 0 ? '#3d3015' : '#2d3654'}`, marginBottom: 8, cursor: 'pointer' }}>
                <div style={{ fontSize: 22, flexShrink: 0 }}>{wineEmoji(w.wineType)}</div>
                <div style={{ flex: 1 }}>
                  {i === 0 && <div style={{ color: '#c4a44a', fontSize: 10, letterSpacing: '.08em', marginBottom: 2 }}>TOP PICK</div>}
                  <div style={{ color: '#f0ead8', fontSize: 13, fontWeight: 500 }}>{w.producer} {w.wineName} {w.vintage}</div>
                  <div style={{ color: '#5a6480', fontSize: 11, marginTop: 1 }}>{w.bottles} bottle{w.bottles !== 1 ? 's' : ''} available · {w.drinkingWindow?.status}</div>
                  <div style={{ color: '#8a96b8', fontSize: 12, marginTop: 5, lineHeight: 1.5 }}>{reason}</div>
                </div>
                <div style={{ color: '#c4a44a', fontSize: 16, flexShrink: 0 }}>›</div>
              </div>
            ))}
          </div>
        )}
        <div style={{ height: 8 }} />
      </div>
      <Nav cur="concierge" />
    </div>
  );

  return null;
}


// ── Setup Screen ──────────────────────────────────────────────────────────────
function SetupScreen({ onSave }) {
  const [key, setKey] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  async function save() {
    const k = key.trim();
    if (!k.startsWith('sk-ant-')) { setErr('Key should start with sk-ant-'); return; }
    setBusy(true); setErr('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': k, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 10, messages: [{ role: 'user', content: 'hi' }] })
      });
      if (!res.ok) { const t = await res.text(); throw new Error('Key rejected: ' + t.slice(0, 120)); }
      localStorage.setItem('cave_api_key', k);
      onSave();
    } catch(e) { setErr(e.message); } finally { setBusy(false); }
  }

  return (
    <div style={{background:'#161c2e',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',maxWidth:440,margin:'0 auto'}}>
      <div style={{fontSize:52,marginBottom:16}}>🍷</div>
      <div style={{fontFamily:'Cormorant Garamond,Georgia,serif',fontStyle:'italic',fontSize:34,color:'#f0ead8',marginBottom:6}}>Cave</div>
      <div style={{color:'#5a6480',fontSize:13,marginBottom:40}}>Your personal wine cellar</div>
      <div style={{width:'100%',background:'#1e2640',border:'0.5px solid #2d3654',borderRadius:16,padding:24}}>
        <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.1em',marginBottom:8}}>ANTHROPIC API KEY</div>
        <input type="password" value={key} onChange={e => setKey(e.target.value)} onKeyDown={e => e.key==='Enter' && save()}
          placeholder="sk-ant-api03-..."
          style={{width:'100%',background:'#252d4a',border:'0.5px solid #3a4468',borderRadius:10,padding:'11px 12px',fontSize:13,color:'#f0ead8',fontFamily:'system-ui',outline:'none',marginBottom:8}} />
        <div style={{color:'#5a6480',fontSize:11,marginBottom:16,lineHeight:1.7}}>
          Get your key at <a href="https://console.anthropic.com/keys" target="_blank" style={{color:'#c4a44a'}}>console.anthropic.com/keys</a>. Stored only on this device.
        </div>
        {err && <div style={{padding:'10px 12px',background:'#2a1010',border:'0.5px solid #4a2020',borderRadius:10,color:'#c44a4a',fontSize:12,marginBottom:12,lineHeight:1.5}}>{err}</div>}
        <button onClick={save} disabled={!key.trim()||busy}
          style={{background:(!key.trim()||busy)?'#252d4a':'#c4a44a',color:(!key.trim()||busy)?'#5a6480':'#0f0c05',border:'none',borderRadius:10,padding:13,fontSize:13,fontWeight:600,cursor:'pointer',width:'100%',letterSpacing:'.04em'}}>
          {busy ? 'Verifying…' : 'Save & open Cave'}
        </button>
      </div>
    </div>
  );
}

function SettingsOverlay({ onClose }) {
  const [key, setKey] = useState(localStorage.getItem('cave_api_key') || '');
  const [saved, setSaved] = useState(false);
  function save() { localStorage.setItem('cave_api_key', key.trim()); setSaved(true); setTimeout(() => { setSaved(false); onClose(); }, 800); }
  function clearData() {
    if (!confirm('Delete all wine data from this device?')) return;
    Object.keys(localStorage).filter(k => k.startsWith('cave:')).forEach(k => localStorage.removeItem(k));
    onClose(); window.location.reload();
  }
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(8,10,18,0.88)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}
      onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div style={{background:'#1e2640',border:'0.5px solid #2d3654',borderRadius:'20px 20px 0 0',padding:24,width:'100%',maxWidth:440}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontFamily:'Cormorant Garamond,Georgia,serif',fontStyle:'italic',color:'#f0ead8',fontSize:22}}>Settings</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#5a6480',fontSize:24,cursor:'pointer'}}>×</button>
        </div>
        <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.1em',marginBottom:6}}>API KEY</div>
        <input type="password" value={key} onChange={e => setKey(e.target.value)}
          style={{width:'100%',background:'#252d4a',border:'0.5px solid #3a4468',borderRadius:10,padding:'11px 12px',fontSize:13,color:'#f0ead8',fontFamily:'system-ui',outline:'none',marginBottom:12}} />
        <button onClick={save} style={{background:saved?'#0e2318':'#c4a44a',color:saved?'#4a9e6a':'#0f0c05',border:'none',borderRadius:10,padding:12,fontSize:13,fontWeight:600,cursor:'pointer',width:'100%',marginBottom:10}}>
          {saved ? '✓ Saved' : 'Update key'}
        </button>
        <button onClick={clearData} style={{background:'transparent',color:'#c44a4a',border:'0.5px solid #4a2020',borderRadius:10,padding:12,fontSize:12,cursor:'pointer',width:'100%'}}>
          Clear all cave data
        </button>
        <div style={{color:'#5a6480',fontSize:11,textAlign:'center',marginTop:14}}>Cave v1.0</div>
      </div>
    </div>
  );
}

function App() {
  const [hasKey, setHasKey] = useState(!!localStorage.getItem('cave_api_key'));
  const [showSettings, setShowSettings] = useState(false);
  if (!hasKey) return <SetupScreen onSave={() => setHasKey(true)} />;
  return (
    <div style={{position:'relative'}}>
      <button onClick={() => setShowSettings(true)}
        style={{position:'fixed',top:'calc(18px + env(safe-area-inset-top))',right:14,zIndex:50,background:'none',border:'none',color:'#5a6480',fontSize:20,cursor:'pointer',padding:4}}>
        ⚙
      </button>
      <Cave />
      {showSettings && <SettingsOverlay onClose={() => setShowSettings(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
