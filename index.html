          style={{paddingLeft:32,fontSize:13,background:'#EDE0C4',border:'0.5px solid #D4C4A0'}}/>
        <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#9A7A50',fontSize:14,pointerEvents:'none'}}>🔍</span>
        {searchQuery&&<button onClick={()=>setSearchQuery('')}
          style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#9A7A50',cursor:'pointer',fontSize:16,lineHeight:1}}>×</button>}
      </div>
      <div className="scrl" style={{marginBottom:8}}>
        {[['all',`All (${cellar.length})`],['red',`Red (${cellar.filter(w=>w.wineType==='red').length})`],
          ['white',`White (${cellar.filter(w=>w.wineType==='white').length})`],
          ['sparkling',`Sparkling (${cellar.filter(w=>w.wineType==='sparkling').length})`],
          ['rose',`Rosé (${cellar.filter(w=>w.wineType==='rosé'||w.wineType==='rose').length})`]
        ].map(([v,l])=>(
          <button key={v} className={`chip ${filterType===v?'chipon':''}`} onClick={()=>setFilterType(v)}>{l}</button>
        ))}
      </div>
      <div className="scrl">
        <span style={{color:'#9A7A50',fontSize:11,alignSelf:'center',flexShrink:0}}>Sort:</span>
        {[['type','Type'],['varietal','Varietal'],['price↑','Price ↑'],['price↓','Price ↓'],['drink','Drink by']].map(([v,l])=>(
          <button key={v} className={`chip ${sortBy===v?'chipon':''}`} onClick={()=>setSortBy(v)}>{l}</button>
        ))}
      </div>
    </div>
    <div style={{padding:'0 16px',flex:1,overflowY:'auto'}}>
      {filteredCellar.length===0 ? (
        <div style={{textAlign:'center',padding:'48px 0',color:'#9A7A50'}}>
          <div style={{fontSize:32,marginBottom:8}}>🍷</div>
          <div className="di" style={{color:'#6A5030',fontSize:18}}>No wines here yet</div>
        </div>
      ) : filteredCellar.map(w=>(
        <div key={w.id}>
          <div className="row" onClick={()=>{setSelId(w.id);setView('detail');}}>
            <div style={{width:34,height:46,borderRadius:5,background:w.image?'#EDE0C4':wineBg(w.wineType),border:'0.5px solid '+wineBorder(w.wineType),display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,overflow:'hidden'}}>
              {(w.image||w.labelImage)?<img src={w.image||w.labelImage} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:4}}/>:wineEmoji(w.wineType)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:'#2C1F0E',fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{w.producer}</div>
              <div style={{color:'#9A7A50',fontSize:11,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{w.wineName} {w.vintage}</div>
              <div style={{marginTop:3,display:'flex',gap:4,alignItems:'center'}}>
                <span style={{color:'#C4963A',fontSize:11}}>{w.bottles} btl</span>
                <span style={{color:'#C4B48A'}}>·</span>
                {(w.grapeVarieties||[]).slice(0,1).map(g=><span key={g} className={pillCls(w.wineType)}>{g}</span>)}
              </div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{color:'#C4963A',fontSize:13}}>${Math.round(avg(w))}</div>
              <div className={statusCls(w.drinkingWindow?.status||'')} style={{marginTop:4}}>{statusLabel(w.drinkingWindow?.status)||'—'}</div>
            </div>
          </div>
          {quickPriceMode ? (
            <div style={{padding:'6px 0 10px',marginLeft:44,display:'flex',alignItems:'center',gap:8}}>
              <span style={{color:'#9A7A50',fontSize:11}}>Paid:</span>
              <div style={{position:'relative',flex:1,maxWidth:130}}>
                <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#9A7A50',fontSize:13,pointerEvents:'none'}}>$</span>
                <input type="number" placeholder={w.purchasePrice?String(w.purchasePrice):'enter price'}
                  value={quickPriceEdits[w.id]!==undefined?quickPriceEdits[w.id]:(w.purchasePrice||'')}
                  onChange={e=>{const v={};v[w.id]=e.target.value;setQuickPriceEdits(prev=>Object.assign({},prev,v));}}
                  onClick={e=>e.stopPropagation()}
                  style={{paddingLeft:22,fontSize:13,width:'100%'}}/>
              </div>
              {w.purchasePrice&&<span style={{color:'#9A7A50',fontSize:10}}>was ${w.purchasePrice}</span>}
            </div>
          ) : (
            <div style={{display:'flex',gap:6,padding:'4px 0 8px',marginLeft:44}}>
              {[{lbl:'🥂 Drank',action:'drank',bg:'#E8F0DC',bdr:'#A0C878',col:'#4a9e6a'},
                {lbl:'🎁 Gave',action:'gave',bg:'#B8D0E8',bdr:'#1e3060',col:'#7ab0e8'},
                {lbl:'🗑',action:'delete',bg:'#F5E4E0',bdr:'#D4A090',col:'#c44a4a'}].map(a=>(
                <button key={a.action} style={{background:a.bg,border:`0.5px solid ${a.bdr}`,color:a.col,borderRadius:8,padding:'4px 10px',fontSize:11,cursor:'pointer'}}
                  onClick={e=>{e.stopPropagation();setSelId(w.id);setLogAction(a.action);setLogNotes('');setLogRating(0);setView('log');}}>
                  {a.lbl}
                </button>
              ))}
            </div>
          )}
        </div>
      ))}
      <div style={{height:8}}/>
    </div>
    <div style={{padding:'8px 16px'}}><button className="btn" onClick={goScan}>+ Scan new bottle</button></div>
  </>, 'cellar');

  // ── CONSTELLATION (D) ─────────────────────────────────────────────────────
  if (view==='grid') {
    // Calculate months until optimal drinking for each wine
    function getMo(w) {
      const s = normalizeStatus(w.drinkingWindow?.status || '');
      const vintage = parseInt(w.vintage) || 2020;

      if (s === 'past peak') {
        // Past peak: slightly left of Now, spread by how far past peak
        const yearsOver = Math.max(0, 2026 - vintage - 15);
        return Math.max(-4, -yearsOver);  // negative = left of now (past peak zone)
      }

      if (s === 'drink now' || s === 'peak') {
        // CORE FIX: spread drink-now wines by vintage urgency
        // Older vintage = more urgent = further left (closer to 0)
        // Younger vintage = less urgent = drift right up to 8mo
        const age = 2026 - vintage;
        if (age >= 20) return 0;       // Very old: right at Now
        if (age >= 15) return 1;       // 15-20yr: slight drift
        if (age >= 10) return 2;       // 10-15yr: modest drift
        if (age >= 7)  return 3;       // 7-10yr: moderate
        if (age >= 5)  return 5;       // 5-7yr: some drift
        if (age >= 3)  return 7;       // 3-5yr: more drift
        return 9;                       // <3yr: most rightward in drink-now zone
      }

      if (s === 'drink soon') {
        // Drink soon: 10-14 months
        const age = 2026 - vintage;
        return age >= 5 ? 10 : 13;
      }

      if (s === 'hold') {
        const sy = parseInt(w.drinkingWindow?.start) || 0;
        if (sy > 2026) return Math.min((sy - 2026) * 12, 44);
        // Hold wines without explicit window: spread by vintage
        const age = 2026 - vintage;
        return age < 3 ? 24 : age < 5 ? 20 : 18;
      }

      return 0;
    }

    const priced = filteredCellar.map(w => ({...w, _price: avg(w)||0, _mo: getMo(w)}));
    const maxP   = Math.max(...priced.map(w => w._price), 50);
    const pMax   = Math.ceil(maxP * 1.18 / 50) * 50;

    // Chart geometry
    const VW=340, VH=268, L=48, R=14, T=22, B=46;
    const CW=VW-L-R, CH=VH-T-B;
    const toX = mo => L + ((Math.min(mo,44)+4)/48)*CW;
    const toY = p  => T + CH - ((Math.min(p,pMax)/pMax)*CH);

    // Deterministic jitter — group wines by position bucket, spiral within group
    const buckets = {};
    priced.forEach(w => {
      const bx = Math.round(toX(w._mo)/18);
      const by = Math.round(toY(w._price)/16);
      const k  = bx+'_'+by;
      if (!buckets[k]) buckets[k] = [];
      buckets[k].push(w);
    });
    priced.forEach(w => {
      const bx = Math.round(toX(w._mo)/18);
      const by = Math.round(toY(w._price)/16);
      const k  = bx+'_'+by;
      const grp = buckets[k];
      const idx = grp.indexOf(w);
      const n   = grp.length;
      let ox=0, oy=0;
      if (n > 1 && idx > 0) {
        const angle = (idx/n)*Math.PI*2 - Math.PI/2;
        const r     = Math.min(n*3, 12);
        ox = Math.cos(angle)*r;
        oy = Math.sin(angle)*r*0.65;
      }
      const idealX = toX(w._mo);
      const idealY = toY(w._price);
      w._cx = Math.max(L+7, Math.min(L+CW-7, idealX+ox));
      w._cy = Math.max(T+7, Math.min(T+CH-7, idealY+oy));
    });

    // Price axis tick values
    const pTicks = [];
    const step = pMax<=100?25:pMax<=200?50:100;
    for (let p=0; p<=pMax; p+=step) pTicks.push(p);

    const xMoTicks = [-4,0,3,6,10,18,30,44];
    const xMoLabels= ['Past','Now','','6mo','10mo','18mo','30mo','3.5yr+'];

    const wTypeColor = t => ({'red':'#b33a2a','white':'#c48a10','sparkling':'#1f6fa8','rosé':'#c2387a','rose':'#c2387a'}[(t||'').toLowerCase()]||'#7a6a8a');
    const wTypeFill  = t => ({'red':'rgba(179,58,42,0.82)','white':'rgba(196,138,16,0.82)','sparkling':'rgba(31,111,168,0.82)','rosé':'rgba(194,56,122,0.82)','rose':'rgba(194,56,122,0.82)'}[(t||'').toLowerCase()]||'rgba(122,106,138,0.82)');


    const totalVal = Math.round(priced.reduce((s,w)=>s+(w._price*(w.bottles||1)),0));
    const drinkNowCount = priced.filter(w=>w._mo===0).length;
    const holdCount     = priced.filter(w=>w._mo>0).length;

    return wrap(<>
      <div style={{padding:'14px 16px 8px',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div className="di" style={{color:'#2C1F0E',fontSize:22}}>Constellation</div>
          <div style={{color:'#9A7A50',fontSize:11,marginTop:2}}>
            {priced.length} wines · ${totalVal.toLocaleString()} est. retail
          </div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <div style={{background:'#E8F0DC',border:'0.5px solid #A0C878',borderRadius:8,padding:'5px 10px',textAlign:'center'}}>
            <div className="df" style={{color:'#4A7A2E',fontSize:17}}>{drinkNowCount}</div>
            <div style={{color:'#9A7A50',fontSize:9,letterSpacing:'.04em'}}>OPEN</div>
          </div>
          <div style={{background:'#F5EAD8',border:'0.5px solid #D4A870',borderRadius:8,padding:'5px 10px',textAlign:'center'}}>
            <div className="df" style={{color:'#9A5818',fontSize:17}}>{holdCount}</div>
            <div style={{color:'#9A7A50',fontSize:9,letterSpacing:'.04em'}}>HOLD</div>
          </div>
        </div>
      </div>

      {/* Type filter chips */}
      <div style={{padding:'0 16px 8px'}}>
        <div className="scrl">
          {[['all','All'],['red','Red'],['white','White'],['sparkling','Sparkling'],['rose','Rosé']].map(([v,l])=>(
            <button key={v} className={`chip ${filterType===v?'chipon':''}`}
              onClick={()=>setFilterType(v===filterType?'all':v)}>{l}</button>
          ))}
        </div>
      </div>

      {/* SVG constellation */}
      <div style={{padding:'0 14px',position:'relative'}}>
        <svg width="100%" viewBox={`0 0 ${VW} ${VH}`} style={{overflow:'visible',display:'block'}}>

          {/* Drink-zone soft tint */}
          <rect x={toX(0)} y={T} width={toX(9)-toX(0)} height={CH}
            fill="rgba(74,140,58,0.12)" rx="4"/>
          <text x={L+(toX(7)-L)/2} y={T-5} textAnchor="middle"
            style={{fontSize:8,fill:'rgba(60,120,40,0.7)',fontFamily:'system-ui'}}>open now</text>

          {/* X grid lines + labels */}
          {xMoTicks.map((mo,i)=>{
            const x = toX(mo);
            return (
              <g key={mo}>
                <line x1={x} y1={T} x2={x} y2={T+CH}
                  stroke="rgba(44,31,14,0.10)" strokeDasharray="3,4"/>
                <text x={x} y={T+CH+13} textAnchor="middle"
                  style={{fontSize:9,fill:'rgba(44,31,14,0.45)',fontFamily:'system-ui'}}>
                  {xMoLabels[i]}
                </text>
              </g>
            );
          })}

          {/* Y grid lines + price labels */}
          {pTicks.map(p=>{
            const y = toY(p);
            return (
              <g key={p}>
                <line x1={L} y1={y} x2={L+CW} y2={y}
                  stroke="rgba(44,31,14,0.10)" strokeDasharray="2,5"/>
                <text x={L-4} y={y+4} textAnchor="end"
                  style={{fontSize:9,fill:'rgba(44,31,14,0.45)',fontFamily:'system-ui'}}>
                  ${p}
                </text>
              </g>
            );
          })}

          {/* Axis labels */}
          <text x={L+CW/2} y={T+CH+30} textAnchor="middle"
            style={{fontSize:9,fill:'rgba(44,31,14,0.40)',fontFamily:'system-ui'}}>
            months until optimal drinking
          </text>
          <text x={11} y={T+CH/2} textAnchor="middle"
            transform={`rotate(-90,11,${T+CH/2})`}
            style={{fontSize:9,fill:'rgba(44,31,14,0.40)',fontFamily:'system-ui'}}>
            retail value
          </text>

          {/* Wine dots — draw lower-value first so expensive ones appear on top */}
          {priced.slice().sort((a,b)=>a._price-b._price).map(w=>{
            const c    = wTypeColor(w.wineType);
            const fill = wTypeFill(w.wineType);
            const r    = Math.max(5, Math.min(14, 4 + (w._price/pMax)*18));
            const isHov= hovId===w.id;
            const isUrgent = w._mo===0 && w._price>=75;
            return (
              <g key={w.id} style={{cursor:'pointer'}}
                onClick={()=>{setSelId(w.id);setView('detail');}}
                onMouseEnter={()=>setHovId(w.id)}
                onMouseLeave={()=>setHovId(null)}>

                {/* Urgency ring — high-value drink-now */}
                {isUrgent&&(
                  <circle cx={w._cx} cy={w._cy} r={r+6}
                    fill="none" stroke={c} strokeWidth="1"
                    strokeOpacity="0.3" strokeDasharray="3,2.5"/>
                )}

                {/* Hover ring */}
                {isHov&&(
                  <circle cx={w._cx} cy={w._cy} r={r+4}
                    fill="none" stroke={c} strokeWidth="1.5" strokeOpacity="0.7"/>
                )}

                {/* Main dot */}
                <circle cx={w._cx} cy={w._cy} r={r}
                  fill={fill} stroke={c} strokeWidth="0.8"/>

                {/* Label for premium wines */}
                {w._price>=100&&(
                  <text x={w._cx+r+3} y={w._cy+4} textAnchor="start"
                    style={{fontSize:8,fill:c,fontFamily:'system-ui',fontWeight:500,
                      pointerEvents:'none'}}>
                    {(w.producer||'').split(' ').slice(0,2).join(' ')}
                  </text>
                )}
              </g>
            );
          })}
        </svg>

        {/* Hover tooltip */}
        {hovId&&(()=>{
          const w = priced.find(x=>x.id===hovId);
          if (!w) return null;
          const isLeft = w._cx < VW/2;
          return (
            <div style={{
              position:'absolute',
              top: (w._cy/VH*100)+'%',
              ...(isLeft ? {left:(w._cx/VW*100+8)+'%'} : {right:((VW-w._cx)/VW*100+4)+'%'}),
              background:'#EDE0C4',
              border:`0.5px solid ${wTypeColor(w.wineType)}55`,
              borderRadius:10,padding:'8px 12px',
              pointerEvents:'none',zIndex:10,minWidth:130,
              transform:'translateY(-50%)'
            }}>
              <div style={{color:'#2C1F0E',fontSize:12,fontWeight:500,marginBottom:3}}>
                {w.producer}
              </div>
              <div style={{color:'#6A5030',fontSize:11,marginBottom:4}}>
                {w.wineName} {w.vintage}
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span className="df" style={{color:'#C4963A',fontSize:14}}>
                  {w._price>0?`$${Math.round(w._price)}`:'—'}
                </span>
                <span className={statusCls(w.drinkingWindow?.status)}>
                  {statusLabel(w.drinkingWindow?.status||'')||'—'}
                </span>
              </div>
              {w.bottles>0&&<div style={{color:'#9A7A50',fontSize:10,marginTop:3}}>
                {w.bottles} bottle{w.bottles!==1?'s':''}
              </div>}
            </div>
          );
        })()}
      </div>

      {/* Legend */}
      <div style={{padding:'6px 16px 8px',display:'flex',gap:10,flexWrap:'wrap'}}>
        {[['red','Red','#b33a2a'],['white','White','#c48a10'],
          ['sparkling','Sparkling','#1f6fa8'],['rosé','Rosé','#c2387a']].map(([k,l,c])=>(
          <div key={k} style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:c,opacity:.85}}/>
            <span style={{color:'#9A7A50',fontSize:10}}>{l}</span>
          </div>
        ))}
        <div style={{display:'flex',alignItems:'center',gap:5,marginLeft:'auto'}}>
          <svg width="14" height="10"><circle cx="7" cy="5" r="4" fill="none"
            stroke="#C4963A" strokeWidth="0.8" strokeDasharray="2,1.5"/></svg>
          <span style={{color:'#9A7A50',fontSize:10}}>open now ≥$75</span>
        </div>
      </div>

      {cellar.length===0&&(
        <div style={{textAlign:'center',padding:'32px 0',color:'#9A7A50'}}>
          <div className="di" style={{fontSize:18,color:'#6A5030'}}>Add wines to see the constellation</div>
        </div>
      )}
    </>, 'cellar');
  }

  // ── CONCIERGE ─────────────────────────────────────────────────────────────
  if (view==='concierge') return wrap(<>
    <div style={{padding:'20px 16px 12px'}}>
      <div className="di" style={{color:'#2C1F0E',fontSize:26,marginBottom:3}}>Concierge</div>
      <div style={{color:'#9A7A50',fontSize:13}}>Tell me about your evening</div>
    </div>
    <div style={{padding:'0 16px',flex:1,overflowY:'auto'}}>
      <div className="card" style={{marginBottom:12}}>
        <div className="sec">WHAT'S HAPPENING TONIGHT?</div>
        <textarea value={concText} onChange={e=>{setConcText(e.target.value);setRecs(null);}} rows={4}
          placeholder="e.g. Grilling portobello mushrooms for 4 guests, two prefer bold reds, one likes lighter wines…" style={{marginBottom:10}}/>
        <button className="btn" onClick={runConcierge} disabled={loading||!concText.trim()||!cellar.length}>
          {loading?'Consulting the sommelier…':'Get recommendation'}
        </button>
        {!cellar.length&&<div style={{color:'#9A7A50',fontSize:11,textAlign:'center',marginTop:8}}>Add wines to your cave first</div>}
      </div>
      {error&&<div className="err" style={{marginBottom:12}}>{error}</div>}
      {recs!==null&&(
        <div className="card">
          <div className="sec">FROM YOUR CAVE</div>
          {recs.length===0 ? (
            <div style={{color:'#6A5030',fontSize:13,fontStyle:'italic',lineHeight:1.6}}>
              No wines in your cave are ready to drink right now.
            </div>
          ) : recs.map(({wine:w,reason},i)=>w&&(
            <div key={i} style={{marginBottom:10,borderRadius:12,overflow:'hidden',border:`0.5px solid ${i===0?'#C4963A':'#D4C4A0'}`}}>
              {i===0&&<div style={{background:'#2C1F0E',padding:'5px 14px',color:'#C4963A',fontSize:10,letterSpacing:'.08em',fontWeight:600}}>★ TOP PICK</div>}
              {/* Sommelier reason */}
              <div style={{background:'#EDE0C4',padding:'10px 14px',borderBottom:'0.5px solid #D4C4A0'}}>
                <div style={{color:'#6A5030',fontSize:12,lineHeight:1.6,fontStyle:'italic'}}>{reason}</div>
              </div>
              {/* Mini wine card */}
              <div onClick={()=>{setSelId(w.id);setView('detail');}}
                style={{background:i===0?'#E8DCC8':'#F0E8D4',padding:'12px 14px',cursor:'pointer',display:'flex',gap:12,alignItems:'flex-start'}}>
                <div style={{width:44,height:60,borderRadius:6,background:w.image?'#EDE0C4':wineBg(w.wineType),border:'0.5px solid '+wineBorder(w.wineType),display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0,overflow:'hidden'}}>
                  {(w.image||w.labelImage)?<img src={w.image||w.labelImage} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:wineEmoji(w.wineType)}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:'#9A7A50',fontSize:10,letterSpacing:'.08em',marginBottom:1}}>{(w.producer||'').toUpperCase()}</div>
                  <div className="di" style={{color:'#2C1F0E',fontSize:16,lineHeight:1.2,marginBottom:3}}>{w.wineName}</div>
                  <div style={{color:'#6A5030',fontSize:11,marginBottom:5}}>{w.vintage}{w.region?` · ${w.region}`:''}</div>
                  <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                    <span className="df" style={{color:'#C4963A',fontSize:14}}>{avg(w)>0?`$${Math.round(avg(w))}`:'—'}</span>
                    <span className={statusCls(w.drinkingWindow?.status)}>{statusLabel(w.drinkingWindow?.status)||'—'}</span>
                    <span style={{color:'#9A7A50',fontSize:10}}>{w.bottles} btl</span>
                    {w.servingTemp&&<span style={{color:'#9A7A50',fontSize:10}}>· {w.servingTemp}</span>}
                  </div>
                  {w.tastingNotes?.nose&&<div style={{color:'#9A7A50',fontSize:11,marginTop:5,fontStyle:'italic',lineHeight:1.4}}>"{w.tastingNotes.nose}"</div>}
                </div>
                <div style={{color:'#C4963A',fontSize:16,flexShrink:0,marginTop:4}}>›</div>
              </div>
            </div>
          ))}
        </div>
      )}
      <div style={{height:8}}/>
    </div>
  </>, 'concierge');

  function importCSV(e) {
    const file = e.target.files?.[0]; e.target.value='';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const lines = reader.result.split('\n').filter(function(l){ return l.trim(); });
      if (lines.length < 2) { alert('CSV appears empty'); return; }
      const headers = lines[0].split(',').map(function(h){ return h.replace(/^"|"$/g,'').trim(); });
      const get = function(row, name) {
        const i = headers.findIndex(function(h){ return h.toLowerCase()===name.toLowerCase(); });
        if (i < 0) return '';
        const v = row[i] || '';
        return v.replace(/^"|"$/g,'').trim();
      };

      // Parse all rows synchronously — no await inside loop
      const toSave = [];
      let skipped = 0;
      for (let li = 1; li < lines.length; li++) {
        // Proper CSV row parser — character by character, no infinite loop
        const row = (function parseRow(line) {
          var fields = [], i = 0;
          while (i < line.length) {
            if (line[i] === '"') {
              var field = ''; i++;
              while (i < line.length) {
                if (line[i] === '"' && line[i+1] === '"') { field += '"'; i += 2; }
                else if (line[i] === '"') { i++; break; }
                else { field += line[i++]; }
              }
              fields.push(field);
              if (i < line.length && line[i] === ',') i++;
            } else {
              var start2 = i;
              while (i < line.length && line[i] !== ',') i++;
              fields.push(line.slice(start2, i));
              if (i < line.length && line[i] === ',') i++;
            }
          }
          return fields;
        })(lines[li]);
        const producer = get(row,'Producer');
        const wineName = get(row,'Wine Name');
        if (!producer && !wineName) continue;
        const vintage = get(row,'Vintage') || 'NV';
        const alreadyExists = cellar.find(function(w){
          return w.producer===producer && w.wineName===wineName && w.vintage===vintage;
        });
        if (alreadyExists) { skipped++; continue; }
        const rawStatus = get(row,'Drink Status') || get(row,'Status') || 'hold';
        const wine = {
          id: String(Date.now() + li),
          producer, wineName, vintage,
          region: get(row,'Region'),
          appellation: get(row,'Appellation'),
          grapeVarieties: get(row,'Grape Varieties').split(';').map(function(s){ return s.trim(); }).filter(Boolean),
          wineType: get(row,'Type') || 'red',
          bottles: parseInt(get(row,'Bottles')) || 1,
          retailPriceLow: parseFloat(get(row,'Retail Low')) || null,
          retailPriceHigh: parseFloat(get(row,'Retail High')) || null,
          priceMedian: parseFloat(get(row,'Retail Median')) || null,
          priceNote: 'Imported from CSV',
          livePriceFetched: false,
          purchasePrice: parseFloat(get(row,'Purchase Price')) || null,
          purchaseWhere: get(row,'Purchase Where') || null,
          purchaseDate: get(row,'Purchase Date') || get(row,'Added Date') || null,
          drinkingWindow: {
            status: normalizeStatus(rawStatus),
            start: get(row,'Drink Window Start'),
            end: get(row,'Drink Window End'),
            recommendation: get(row,'Drinking Window Note')
          },
          cellaring: {
            shouldCellar: normalizeStatus(rawStatus) === 'hold',
            yearsToHold: get(row,'Cellar Years'),
            storageNotes: ''
          },
          tastingNotes: {
            nose: get(row,'Nose'),
            palate: get(row,'Palate'),
            finish: get(row,'Finish')
          },
          servingTemp: get(row,'Serving Temp'),
          decantingAdvice: get(row,'Decanting'),
          myNotes: get(row,'My Notes') || '',
          image: '',
          addedAt: Date.now() + li,
          drinkLog: []
        };
        toSave.push(wine);
      }

      // Save all wines in parallel with Promise.all — no async generator
      const saves = toSave.map(function(wine) {
        return window.storage.set('wine:' + wine.id, JSON.stringify(wine));
      });
      const imported = toSave.length;
      Promise.all(saves).then(function() {
        return loadCellar();
      }).then(function() {
        alert(imported + ' wine' + (imported !== 1 ? 's' : '') + ' imported' +
              (skipped ? ', ' + skipped + ' skipped (already in cave)' : '') + '.');
      }).catch(function(err) {
        alert('Import failed: ' + err.message);
      });
    };
    reader.readAsText(file);
  }

  // ── SETTINGS ──────────────────────────────────────────────────────────────
  if (view==='settings') return wrap(<>
    <div style={{padding:'20px 16px 12px'}}>
      <div className="di" style={{color:'#2C1F0E',fontSize:26,marginBottom:3}}>Settings</div>
      <div style={{color:'#9A7A50',fontSize:13}}>{profileName}</div>
    </div>
    <div style={{padding:'0 16px',flex:1,overflowY:'auto'}}>
      <SettingsPanel profileId={profileId} onSwitchProfile={onSwitchProfile} importCSV={importCSV} onRefreshAllPrices={refreshAllPrices} refreshingPrice={refreshingPrice} refreshMsg={refreshMsg}/>
      <div style={{height:16}}/>
    </div>
  </>, 'settings');

  return null;
}

// ─── SETTINGS PANEL ───────────────────────────────────────────────────────────
function SettingsPanel({ profileId, onSwitchProfile, importCSV, onRefreshAllPrices, refreshingPrice, refreshMsg }) {
  const { useState } = React;
  const [key, setKey] = useState(getApiKey(profileId));
  const [saved, setSaved] = useState(false);
  const [testing, setTesting] = useState(false);
  const [keyErr, setKeyErr] = useState('');

  async function saveKey() {
    setTesting(true); setKeyErr('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
      });
      if (!res.ok) { const t=await res.text(); throw new Error('Key rejected: '+t.slice(0,100)); }
      store.set(`cave_key_${profileId}`, key.trim());
      store.set('cave_api_key', key.trim());
      setSaved(true); setTimeout(()=>setSaved(false),1500);
    } catch(e) { setKeyErr(e.message); } finally { setTesting(false); }
  }


  function exportCSV() {
    const prefix = getProfilePrefix(profileId);
    const keys = store.keys(prefix + 'wine:');
    const wines = keys.map(k => {
      try { return JSON.parse(store.get(k)); } catch { return null; }
    }).filter(Boolean);

    const headers = [
      'Producer','Wine Name','Vintage','Region','Appellation','Grape Varieties','Type',
      'Bottles','Retail Low','Retail High','Retail Median','Purchase Price','Purchase Where','Purchase Date',
      'Drink Status','Drink Window Start','Drink Window End','Drinking Window Note',
      'Cellar Years','Serving Temp','Decanting',
      'Nose','Palate','Finish','My Notes','Added Date'
    ];

    const rows = wines.map(w => [
      w.producer||'', w.wineName||'', w.vintage||'', w.region||'', w.appellation||'',
      (w.grapeVarieties||[]).join('; '), w.wineType||'',
      w.bottles||0, w.retailPriceLow||'', w.retailPriceHigh||'', w.priceMedian||'',
      w.purchasePrice||'', w.purchaseWhere||'', w.purchaseDate||'',
      w.drinkingWindow?.status||'', w.drinkingWindow?.start||'', w.drinkingWindow?.end||'',
      (w.drinkingWindow?.recommendation||'').replace(/,/g,' '),
      (w.cellaring?.yearsToHold||'').replace(/,/g,' '),
      w.servingTemp||'', (w.decantingAdvice||'').replace(/,/g,' '),
      (w.tastingNotes?.nose||'').replace(/,/g,' '),
      (w.tastingNotes?.palate||'').replace(/,/g,' '),
      (w.tastingNotes?.finish||'').replace(/,/g,' '),
      (w.myNotes||'').replace(/,/g,' '),
      w.addedAt ? new Date(w.addedAt).toLocaleDateString() : ''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`));

    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `cave-cellar-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function clearData() {
    if (!confirm('Delete ALL wine data for this profile? This cannot be undone.')) return;
    const prefix = getProfilePrefix(profileId);
    store.keys(prefix+'wine:').forEach(k=>store.del(k));
    window.location.reload();
  }

  const isPwaInstalled = isPWA();

  return (
    <>
      {!isPwaInstalled&&(
        <div style={{background:'#2C1F0E',border:'0.5px solid #8A6A40',borderRadius:14,padding:16,marginBottom:14}}>
          <div style={{color:'#C4963A',fontSize:13,fontWeight:600,marginBottom:6}}>📲 Install Cave for data persistence</div>
          <div style={{color:'#9A7A50',fontSize:12,lineHeight:1.6,marginBottom:10}}>
            In Safari: tap the <strong style={{color:'#C4963A'}}>Share button</strong> → <strong style={{color:'#C4963A'}}>Add to Home Screen</strong>. This prevents Safari from clearing your data.
          </div>
          <div style={{color:'#9A7A50',fontSize:11}}>Currently running in browser — data may not persist.</div>
        </div>
      )}
      {isPwaInstalled&&(
        <div style={{background:'#E8F0DC',border:'0.5px solid #A0C878',borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{color:'#4A7A2E',fontSize:13,fontWeight:600}}>✓ Installed as PWA — data persists</div>
        </div>
      )}

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">API KEY</div>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} style={{marginBottom:8}}/>
        {keyErr&&<div className="err" style={{marginBottom:8}}>{keyErr}</div>}
        <button onClick={saveKey} disabled={!key.trim()||testing}
          style={{background:saved?'#0e2318':(!key.trim()||testing)?'#EDE0C4':'#C4963A',color:saved?'#4a9e6a':(!key.trim()||testing)?'#9A7A50':'#FDF8EE',border:'none',borderRadius:10,padding:12,fontSize:13,fontWeight:600,cursor:'pointer',width:'100%'}}>
          {testing?'Verifying…':saved?'✓ Saved':'Update API key'}
        </button>
        <div style={{color:'#9A7A50',fontSize:11,marginTop:8,lineHeight:1.6}}>
          Get a key at <a href="https://console.anthropic.com/keys" target="_blank" style={{color:'#C4963A'}}>console.anthropic.com/keys</a>
        </div>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">PROFILES</div>
        <div style={{color:'#6A5030',fontSize:13,marginBottom:10}}>Switch profile or add a new one — perfect for sharing Cave with someone else.</div>
        <button className="gbtn" onClick={onSwitchProfile} style={{marginBottom:8}}>Switch / manage profiles</button>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">DATA</div>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <button onClick={exportCSV} className="gbtn" style={{flex:1}}>⬇ Export CSV</button>
          <label style={{flex:1,cursor:'pointer'}}>
            <div className="gbtn" style={{textAlign:'center'}}>⬆ Import CSV</div>
            <input type="file" accept=".csv" onChange={e=>importCSV(e)} style={{opacity:0,position:'fixed',top:-100,left:-100,width:1,height:1}}/>
          </label>
        </div>
        <div style={{color:'#9A7A50',fontSize:11,marginBottom:10,lineHeight:1.5}}>
          Import wines from a Cave CSV export. Duplicates (same producer + name + vintage) are skipped.
        </div>
        <button onClick={onRefreshAllPrices} disabled={refreshingPrice}
          className="gbtn" style={{marginBottom:8,opacity:refreshingPrice?0.6:1}}>
          {refreshingPrice ? (refreshMsg || 'Refreshing prices…') : '🔄 Refresh all prices from Wine-Searcher'}
        </button>
        {refreshingPrice && (
          <div style={{color:'#9A7A50',fontSize:11,marginBottom:8,lineHeight:1.5,fontStyle:'italic'}}>
            {refreshMsg}
          </div>
        )}
        <div style={{color:'#9A7A50',fontSize:11,marginBottom:10,lineHeight:1.5}}>
          Updates retail prices for all wines in your cave. ~5 sec per wine.
        </div>

        <button onClick={clearData} className="dbtn">Clear all data for this profile</button>
      </div>

      <div style={{color:'#9A7A50',fontSize:11,textAlign:'center',padding:'8px 0'}}>Cave v2.0</div>
    </>
  );
}

// ─── PROFILE SELECT SCREEN ────────────────────────────────────────────────────
function ProfileSelect({ onSelect }) {
  const { useState } = React;
  const profiles = getProfiles();
  const [newName, setNewName] = useState('');
  const [newKey, setNewKey] = useState('');
  const [creating, setCreating] = useState(profiles.length === 0);
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  async function handleCreate() {
    if (!newName.trim()) { setErr('Enter a name.'); return; }
    if (!newKey.trim().startsWith('sk-ant-')) { setErr('Key should start with sk-ant-'); return; }
    setBusy(true); setErr('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':newKey.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
      });
      if (!res.ok) { const t=await res.text(); throw new Error('Key rejected: '+t.slice(0,100)); }
      const id = createProfile(newName.trim(), newKey.trim());
      store.set('cave_api_key', newKey.trim());
      onSelect(id, newName.trim());
    } catch(e) { setErr(e.message); } finally { setBusy(false); }
  }

  return (
    <div style={{background:'#F5EDD8',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',maxWidth:440,margin:'0 auto'}}>
      <style>{CSS}</style>
      <div style={{fontSize:52,marginBottom:16}}>🍷</div>
      <div className="di" style={{color:'#2C1F0E',fontSize:34,marginBottom:6}}>Cave</div>
      <div style={{color:'#9A7A50',fontSize:13,marginBottom:32}}>Your personal wine cellar</div>

      {!creating && profiles.length > 0 ? (
        <div style={{width:'100%'}}>
          <div style={{color:'#9A7A50',fontSize:10,letterSpacing:'.1em',marginBottom:10}}>SELECT PROFILE</div>
          {profiles.map(p=>(
            <button key={p.id} onClick={()=>onSelect(p.id, p.name)}
              style={{width:'100%',background:'#EDE0C4',border:'0.5px solid #D4C4A0',borderRadius:12,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',marginBottom:8,textAlign:'left'}}>
              <div style={{width:38,height:38,borderRadius:'50%',background:'#F0E8D4',border:'0.5px solid #C4B48A',display:'flex',alignItems:'center',justifyContent:'center',color:'#C4963A',fontSize:16,fontWeight:600,flexShrink:0}}>
                {p.name.charAt(0).toUpperCase()}
              </div>
              <div>
                <div style={{color:'#2C1F0E',fontSize:15,fontWeight:500}}>{p.name}</div>
                <div style={{color:'#9A7A50',fontSize:11,marginTop:2}}>Cave profile</div>
              </div>
              <div style={{marginLeft:'auto',color:'#C4963A',fontSize:18}}>›</div>
            </button>
          ))}
          <button className="gbtn" style={{marginTop:8}} onClick={()=>setCreating(true)}>+ Add new profile</button>
        </div>
      ) : (
        <div style={{width:'100%',background:'#EDE0C4',border:'0.5px solid #D4C4A0',borderRadius:16,padding:24}}>
          <div style={{color:'#2C1F0E',fontSize:16,fontWeight:500,marginBottom:16}}>
            {profiles.length===0 ? 'Create your profile' : 'New profile'}
          </div>
          <div style={{color:'#9A7A50',fontSize:10,letterSpacing:'.08em',marginBottom:5}}>YOUR NAME</div>
          <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Alok" style={{marginBottom:12}}/>
          <div style={{color:'#9A7A50',fontSize:10,letterSpacing:'.08em',marginBottom:5}}>ANTHROPIC API KEY</div>
          <input type="password" value={newKey} onChange={e=>setNewKey(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleCreate()} placeholder="sk-ant-api03-..." style={{marginBottom:8}}/>
          <div style={{color:'#9A7A50',fontSize:11,marginBottom:14,lineHeight:1.7}}>
            Get key at <a href="https://console.anthropic.com/keys" target="_blank" style={{color:'#C4963A'}}>console.anthropic.com/keys</a>. Stored only on this device.
          </div>
          {err&&<div className="err" style={{marginBottom:12}}>{err}</div>}
          <button className="btn" onClick={handleCreate} disabled={!newName.trim()||!newKey.trim()||busy}>
            {busy?'Verifying…':'Create profile & open Cave'}
          </button>
          {profiles.length>0&&<button className="gbtn" style={{marginTop:8}} onClick={()=>setCreating(false)}>Cancel</button>}
        </div>
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const { useState } = React;
  const [profileId, setProfileId] = useState(() => {
    const id = getCurrentProfileId();
    const profiles = getProfiles();
    if (id && profiles.find(p=>p.id===id)) return id;
    if (profiles.length===1) return profiles[0].id;
    return '';
  });
  const [profileName, setProfileName] = useState(() => {
    const id = getCurrentProfileId();
    const profiles = getProfiles();
    const p = profiles.find(x=>x.id===id);
    return p ? p.name : '';
  });

  function handleSelect(id, name) {
    setCurrentProfileId(id);
    buildStorage(id);
    setProfileId(id);
    setProfileName(name);
  }

  function handleSwitch() {
    setProfileId('');
    setProfileName('');
  }

  if (!profileId) {
    return <ProfileSelect onSelect={handleSelect}/>;
  }

  return <Cave profileId={profileId} profileName={profileName} onSwitchProfile={handleSwitch}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  
  
  </script>
</body>
