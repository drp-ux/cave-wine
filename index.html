const pillCls = t => { const s=(t||'').toLowerCase(); if(s==='red')return'pill pr'; if(s==='white')return'pill pw'; if(s==='sparkling')return'pill ps'; if(s==='rosé'||s==='rose')return'pill prs'; return 'pill pw'; };
const statusCls = s => { const v=(s||'').toLowerCase(); if(v.includes('now')||v.includes('soon')||(v.includes('peak')&&!v.includes('past')))return'bdrink'; if(v.includes('past'))return'bdanger'; return'bhold'; };
const wineEmoji = t => ({'red':'🍷','white':'🍾','sparkling':'🥂','rosé':'🌸','rose':'🌸','dessert':'🍯','fortified':'🥃'}[(t||'').toLowerCase()]||'🍷');
const avg = w => ((w.retailPriceLow||0)+(w.retailPriceHigh||0))/2;

function compressImage(dataUrl, maxDim=1400) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',0.82));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function makeThumbnail(dataUrl, size=140) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const s = Math.min(size/img.width, size/img.height);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',0.75));
    };
    img.onerror = () => resolve('');
    img.src = dataUrl;
  });
}

const isPWA = () => window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

// ─── STORAGE ─────────────────────────────────────────────────────────────────
// Profile-aware storage: cave:{profileId}:wine:{id}
function getProfilePrefix(profileId) { return `cave:${profileId}:`; }

const store = {
  get: k => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k, typeof v==='string'?v:JSON.stringify(v)); return true; } catch { return false; } },
  del: k => { try { localStorage.removeItem(k); return true; } catch { return false; } },
  keys: prefix => { try { return Object.keys(localStorage).filter(k=>k.startsWith(prefix)); } catch { return []; } }
};

// window.storage adapter (used by Cave's internal loadCellar/saveWine etc.)
function buildStorage(profileId) {
  const prefix = getProfilePrefix(profileId);
  window.storage = {
    list: async p => ({ keys: store.keys(prefix+(p||'')).map(k => k.slice(prefix.length)) }),
    get: async k => { const v=store.get(prefix+k); if(v===null) throw new Error('not found'); return {value:v}; },
    set: async (k,v) => { store.set(prefix+k, v); return {key:k,value:v}; },
    delete: async k => { store.del(prefix+k); return {key:k,deleted:true}; }
  };
}


// ─── PROFILE MANAGEMENT ───────────────────────────────────────────────────────
function getProfiles() {
  try { return JSON.parse(store.get('cave_profiles')||'[]'); } catch { return []; }
}
function saveProfiles(profiles) { store.set('cave_profiles', JSON.stringify(profiles)); }
function getCurrentProfileId() { return store.get('cave_current_profile') || ''; }
function setCurrentProfileId(id) { store.set('cave_current_profile', id); }
function createProfile(name, apiKey) {
  const id = Date.now().toString();
  const profiles = getProfiles();
  profiles.push({ id, name, createdAt: Date.now() });
  saveProfiles(profiles);
  store.set(`cave_key_${id}`, apiKey);
  return id;
}

// ─── VISION-BASED IDENTIFICATION (no OCR) ────────────────────────────────────

function getApiKey(profileId) {
  return store.get(`cave_key_${profileId}`) || store.get('cave_api_key') || '';
}

async function callAPI(messages, profileId, useSearch=false) {
  const apiKey = getApiKey(profileId);
  if (!apiKey) throw new Error('No API key — go to Settings.');
  const body = {
    model: 'claude-haiku-4-5-20251001',
    max_tokens: 1500,
    messages
  };
  if (useSearch) {
    body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
    body.max_tokens = 2000;
  }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });
  const raw = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${raw.slice(0,200)}`);
  let data;
  try { data = JSON.parse(raw); } catch { throw new Error(`Bad response: ${raw.slice(0,100)}`); }
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  if (data.stop_reason === 'tool_use') {
    // Web search executed server-side — re-extract text from all blocks
    const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if (txt) return txt;
  }
  const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  if (!txt) throw new Error('Empty response from API');
  return txt;
}

function parseJSON(txt) {
  const fence = txt.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) return JSON.parse(fence[1].trim());
  const s = txt.indexOf('{'), e = txt.lastIndexOf('}');
  if (s !== -1 && e > s) return JSON.parse(txt.slice(s, e+1));
  throw new Error(`No JSON found: ${txt.slice(0,120)}`);
}

function imgToBase64(dataUrl) {
  return dataUrl.split(',')[1];
}

async function identifyWine(frontDataUrl, backDataUrl, manualText, profileId) {
  const prompt = `You are an expert sommelier with access to a comprehensive wine database. Analyze the wine label image(s) provided and identify the wine.

CRITICAL RULES:
1. ALWAYS return a best guess — never refuse or say you cannot identify it
2. If the label is partially readable, use what you can see plus your wine knowledge
3. Only set identified:false if the image is completely unreadable (solid blur, no text at all)
4. Use confidence: "high" (you're certain), "medium" (likely correct), "low" (best guess)
5. When confidence is medium or low, populate the alternatives array

Return ONLY a raw JSON object, nothing before or after it:

{"identified":true,"confidence":"high","producer":"exact producer","wineName":"exact wine or cuvee name","vintage":"2021","region":"region, country","appellation":"Barolo DOCG","grapeVarieties":["Nebbiolo"],"wineType":"red","style":"Full-bodied, tannic","retailPriceLow":45,"retailPriceHigh":65,"priceNote":"US retail varies","tastingNotes":{"nose":"aromas","palate":"flavors and texture","finish":"finish"},"drinkingWindow":{"status":"hold","start":"2027","end":"2038","recommendation":"Hold 3-5 more years, peak 2028-2032"},"cellaring":{"shouldCellar":true,"yearsToHold":"3-5 years","storageNotes":"55F, 70% humidity"},"servingTemp":"62-65F","decantingAdvice":"Decant 2 hours","alternatives":[]}

For alternatives (when not high confidence): [{"producer":"...","wineName":"...","vintage":"...","region":"...","reason":"why it could be this"}]
wineType must be: red | white | rose | sparkling | dessert | fortified
Current year: 2026. Realistic US retail prices.
If truly unreadable image only: {"identified":false,"reason":"specific reason"}`;

  const content = [];

  // Add front image if available
  if (frontDataUrl) {
    content.push({
      type: 'image',
      source: { type: 'base64', media_type: 'image/jpeg', data: imgToBase64(frontDataUrl) }
    });
  }

  // Add back image if available
  if (backDataUrl) {
    content.push({
      type: 'image',
      source: { type: 'base64', media_type: 'image/jpeg', data: imgToBase64(backDataUrl) }
    });
  }

  // Add any manual text the user typed
  const textPrompt = manualText
    ? `${prompt}\n\nAdditional text from the user about this label: "${manualText}"`
    : prompt;

  content.push({ type: 'text', text: textPrompt });

  const txt = await callAPI([{ role: 'user', content }], profileId, false);
  return parseJSON(txt);
}

async function getRecommendations(description, cellar, profileId) {
  const list = cellar.map((w,i) =>
    `${i+1}. ${w.producer} "${w.wineName}" ${w.vintage} — ${w.wineType}, ${(w.grapeVarieties||[]).join('/')} — ${w.drinkingWindow?.status||'unknown'} — ${w.bottles} btl`
  ).join('\n');
  const prompt = `You are an expert sommelier. The host says: "${description}"\n\nTheir cellar:\n${list}\n\nRecommend 1-3 wines that best fit tonight. Prioritize drink-now/soon/peak. Return ONLY a JSON array:\n[{"index":1,"reason":"why this wine fits perfectly"}]\n\nIf none are ready, return [].`;
  const txt = await callAPI([{ role: 'user', content: prompt }], profileId, false);
  const m = txt.match(/\[[\s\S]*\]/);
  if (!m) return [];
  return JSON.parse(m[0]);
}

async function fetchLivePrice(producer, wineName, vintage, profileId) {
  const wine = [producer, wineName, vintage].filter(Boolean).join(' ');
  const prompt = `Search for the current US retail price of this wine: "${wine}"

Search Wine-Searcher, Total Wine, and K&L Wines for current US retail listings. Use the actual prices you find.

Return ONLY a raw JSON object — nothing before or after it:
{"priceLow":45,"priceHigh":280,"priceMedian":218,"currency":"USD","sources":["Wine-Searcher","K&L Wines"],"listingsFound":8,"priceNote":"Based on 8 US listings across Wine-Searcher and K&L (April 2026)","confidence":"high"}

Rules:
- priceLow = lowest price found across all searched retailers
- priceHigh = highest price found
- priceMedian = the middle/typical price most people would pay
- listingsFound = total number of US retail listings found
- confidence: "high" (10+ listings), "medium" (3-9), "low" (1-2)
- If no listings found at all: {"priceLow":null,"priceHigh":null,"priceMedian":null,"sources":[],"listingsFound":0,"priceNote":"No current US listings found","confidence":"none"}
- Do not guess — only report prices you actually find from searching`;

  const txt = await callAPI([{ role: 'user', content: prompt }], profileId, true);
  return parseJSON(txt);
}

async function compressForVision(dataUrl, maxDim=1200) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*scale);
      c.height = Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ─── CAVE COMPONENT ───────────────────────────────────────────────────────────
function Cave({ profileId, profileName, onSwitchProfile }) {
  const { useState, useEffect } = React;
  const [view, setView] = useState('home');
  const [cellar, setCellar] = useState([]);
  const [selId, setSelId] = useState(null);
  const [frontImg, setFrontImg] = useState(null);
  const [backImg, setBackImg] = useState(null);
  const [manualText, setManualText] = useState('');
  const [pending, setPending] = useState(null);
  const [pendingQty, setPendingQty] = useState(1);
  const [loading, setLoading] = useState(false);
  const [loadMsg, setLoadMsg] = useState('');
  const [error, setError] = useState('');
  const [logAction, setLogAction] = useState('');
  const [logNotes, setLogNotes] = useState('');
  const [logRating, setLogRating] = useState(0);
  const [filterType, setFilterType] = useState('all');
  const [sortBy, setSortBy] = useState('type');
  const [concText, setConcText] = useState('');
  const [recs, setRecs] = useState(null);
  const [notesDraft, setNotesDraft] = useState('');
  const [editNotes, setEditNotes] = useState(false);
  const [editPending, setEditPending] = useState(null);

  // File input refs — must be at top level (Rules of Hooks)
  const { useRef } = React;
  const frontCamRef    = useRef(null);
  const frontLibRef    = useRef(null);
  const backCamRef     = useRef(null);
  const backLibRef     = useRef(null);
  const retakeFrontRef = useRef(null);
  const retakeBackRef  = useRef(null);

  const sel = cellar.find(w => w.id === selId);
  const stats = {
    bottles: cellar.reduce((s,w)=>s+(w.bottles||0),0),
    value: Math.round(cellar.reduce((s,w)=>s+(w.bottles||0)*avg(w),0)),
    ready: cellar.filter(w=>statusCls(w.drinkingWindow?.status||'')==='bdrink').length
  };

  useEffect(() => { buildStorage(profileId); loadCellar(); }, [profileId]);

  async function loadCellar() {
    try {
      const res = await window.storage.list('wine:');
      if (!res?.keys?.length) { setCellar([]); return; }
      const wines = [];
      for (const key of res.keys) {
        try { const r = await window.storage.get(key); if (r) wines.push(JSON.parse(r.value)); } catch {}
      }
      wines.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
      setCellar(wines);
    } catch { setCellar([]); }
  }

  async function saveWine(wine) { await window.storage.set(`wine:${wine.id}`, JSON.stringify(wine)); await loadCellar(); }
  async function removeWine(id) { await window.storage.delete(`wine:${id}`); await loadCellar(); }

  function resetScan() { setFrontImg(null); setBackImg(null); setManualText(''); setPending(null); setError(''); }
  function goScan() { resetScan(); setView('scan'); }

  async function handlePhoto(e, side) {
    const file = e.target.files?.[0]; e.target.value='';
    if (!file) return;
    setError('');
    const reader = new FileReader();
    reader.onload = async () => {
      const compressed = await compressForVision(reader.result);
      if (side === 'front') setFrontImg(compressed);
      else setBackImg(compressed);
      // DO NOT auto-identify — user taps the button
    };
    reader.readAsDataURL(file);
  }

  async function runIdentification() {
    if (!frontImg && !manualText.trim()) { setError('Add a front label photo or type the wine details.'); return; }
    setView('scanning'); setLoadMsg('Reading label…'); setError('');
    setLoading(true);
    try {
      setLoadMsg('Identifying wine…');
      const wine = await identifyWine(frontImg, backImg, manualText, profileId);
      if (wine.identified) {
        setLoadMsg('Fetching live prices from Wine-Searcher, Total Wine, K&L…');
        try {
          const priceData = await fetchLivePrice(wine.producer, wine.wineName, wine.vintage, profileId);
          if (priceData.listingsFound > 0) {
            wine.retailPriceLow    = priceData.priceLow;
            wine.retailPriceHigh   = priceData.priceHigh;
            wine.priceMedian       = priceData.priceMedian;
            wine.priceNote         = priceData.priceNote;
            wine.priceSources      = priceData.sources || [];
            wine.priceListings     = priceData.listingsFound;
            wine.priceConfidence   = priceData.confidence;
            wine.livePriceFetched  = true;
          } else {
            wine.priceNote        = `No current US listings found — price is Claude's estimate`;
            wine.livePriceFetched  = false;
          }
        } catch(priceErr) {
          wine.priceNote        = `Live price lookup unavailable — price is Claude's estimate`;
          wine.livePriceFetched  = false;
        }
      }
      setPending(wine); setPendingQty(1); setView('is-this-right');
    } catch(err) {
      setError(err.message || 'Identification failed.');
      setView('scan');
    } finally { setLoading(false); }
  }

  async function confirmAdd(wineData) {
    const w = wineData || pending; if (!w) return;
    let thumb = '';
    if (frontImg) {
      thumb = await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const s = Math.min(140/img.width, 140/img.height);
          const c = document.createElement('canvas');
          c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
          c.getContext('2d').drawImage(img,0,0,c.width,c.height);
          resolve(c.toDataURL('image/jpeg',0.75));
        };
        img.onerror = () => resolve('');
        img.src = frontImg;
      });
    }
    const existing = cellar.find(x => x.producer===w.producer && x.wineName===w.wineName && x.vintage===w.vintage);
    if (existing) {
      await saveWine({ ...existing, bottles: (existing.bottles||0)+pendingQty });
    } else {
      const id = Date.now().toString();
      await saveWine({ id, ...w, bottles: pendingQty, myNotes: '', rating: 0, image: thumb, addedAt: Date.now(), drinkLog: [] });
    }
    resetScan(); setView('home');
  }

  async function confirmLog() {
    if (!sel) return;
    if (logAction==='delete') { await removeWine(sel.id); setSelId(null); setLogAction(''); setView('cellar'); return; }
    const entry = { date: new Date().toLocaleDateString(), type: logAction, notes: logNotes, rating: logRating };
    await saveWine({ ...sel, bottles: Math.max(0,(sel.bottles||0)-1), drinkLog: [entry,...(sel.drinkLog||[])] });
    setLogAction(''); setLogNotes(''); setLogRating(0); setView('detail');
  }

  async function adjustQty(delta) { if (!sel) return; await saveWine({ ...sel, bottles: Math.max(0,(sel.bottles||0)+delta) }); }
  async function saveMyNotes() { if (!sel) return; await saveWine({ ...sel, myNotes: notesDraft }); setEditNotes(false); }

  async function runConcierge() {
    if (!concText.trim()||!cellar.length) return;
    setLoading(true); setError(''); setRecs(null);
    try {
      const idxs = await getRecommendations(concText, cellar, profileId);
      setRecs(idxs.map(r=>({ wine: cellar[r.index-1], reason: r.reason })).filter(r=>r.wine));
    } catch(err) { setError(err.message); } finally { setLoading(false); }
  }

  const filteredCellar = cellar

      if(sortBy==='type') return (a.wineType||'').localeCompare(b.wineType||'');
      if(sortBy==='varietal') return ((a.grapeVarieties||[])[0]||'').localeCompare((b.grapeVarieties||[])[0]||'');
      if(sortBy==='price↑') return avg(a)-avg(b);
      if(sortBy==='price↓') return avg(b)-avg(a);
      if(sortBy==='drink') return (a.drinkingWindow?.start||'9999').localeCompare(b.drinkingWindow?.start||'9999');
      return 0;

  // ── SETTINGS ──────────────────────────────────────────────────────────────
  if (view==='settings') return wrap(<>
    <div style={{padding:'20px 16px 12px'}}>
      <div className="di" style={{color:'#f0ead8',fontSize:26,marginBottom:3}}>Settings</div>

      <SettingsPanel profileId={profileId} onSwitchProfile={onSwitchProfile}/>
      <div style={{height:16}}/>
    </div>
  </>, 'settings');

  return null;
}

// ─── SETTINGS PANEL ───────────────────────────────────────────────────────────
function SettingsPanel({ profileId, onSwitchProfile }) {
  const { useState } = React;
  const [key, setKey] = useState(getApiKey(profileId));
  const [saved, setSaved] = useState(false);
  const [testing, setTesting] = useState(false);
  const [keyErr, setKeyErr] = useState('');

  async function saveKey() {
    setTesting(true); setKeyErr('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
      });
      if (!res.ok) { const t=await res.text(); throw new Error('Key rejected: '+t.slice(0,100)); }
      store.set(`cave_key_${profileId}`, key.trim());
      store.set('cave_api_key', key.trim());
      setSaved(true); setTimeout(()=>setSaved(false),1500);
    } catch(e) { setKeyErr(e.message); } finally { setTesting(false); }
  }

  function clearData() {
    if (!confirm('Delete ALL wine data for this profile? This cannot be undone.')) return;
    const prefix = getProfilePrefix(profileId);
    store.keys(prefix+'wine:').forEach(k=>store.del(k));
    window.location.reload();
  }

  const isPwaInstalled = isPWA();

  return (
    <>
      {!isPwaInstalled&&(
        <div style={{background:'#251f0e',border:'0.5px solid #3d3015',borderRadius:14,padding:16,marginBottom:14}}>
          <div style={{color:'#c4a44a',fontSize:13,fontWeight:600,marginBottom:6}}>📲 Install Cave for data persistence</div>
          <div style={{color:'#8a7a50',fontSize:12,lineHeight:1.6,marginBottom:10}}>
            In Safari: tap the <strong style={{color:'#c4a44a'}}>Share button</strong> → <strong style={{color:'#c4a44a'}}>Add to Home Screen</strong>. This prevents Safari from clearing your data.
          </div>
          <div style={{color:'#5a6480',fontSize:11}}>Currently running in browser — data may not persist.</div>
        </div>
      )}
      {isPwaInstalled&&(
        <div style={{background:'#0e2318',border:'0.5px solid #1a3d28',borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{color:'#4a9e6a',fontSize:13,fontWeight:600}}>✓ Installed as PWA — data persists</div>
        </div>
      )}

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">API KEY</div>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} style={{marginBottom:8}}/>
        {keyErr&&<div className="err" style={{marginBottom:8}}>{keyErr}</div>}
        <button onClick={saveKey} disabled={!key.trim()||testing}
          style={{background:saved?'#0e2318':(!key.trim()||testing)?'#252d4a':'#c4a44a',color:saved?'#4a9e6a':(!key.trim()||testing)?'#5a6480':'#0f0c05',border:'none',borderRadius:10,padding:12,fontSize:13,fontWeight:600,cursor:'pointer',width:'100%'}}>
          {testing?'Verifying…':saved?'✓ Saved':'Update API key'}
        </button>
        <div style={{color:'#5a6480',fontSize:11,marginTop:8,lineHeight:1.6}}>
          Get a key at <a href="https://console.anthropic.com/keys" target="_blank" style={{color:'#c4a44a'}}>console.anthropic.com/keys</a>
        </div>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">PROFILES</div>
        <div style={{color:'#8a96b8',fontSize:13,marginBottom:10}}>Switch profile or add a new one — perfect for sharing Cave with someone else.</div>
        <button className="gbtn" onClick={onSwitchProfile} style={{marginBottom:8}}>Switch / manage profiles</button>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">DATA</div>
        <button onClick={clearData} className="dbtn">Clear all data for this profile</button>
      </div>

      <div style={{color:'#5a6480',fontSize:11,textAlign:'center',padding:'8px 0'}}>Cave v2.0</div>
    </>
  );
}

// ─── PROFILE SELECT SCREEN ────────────────────────────────────────────────────
function ProfileSelect({ onSelect }) {
  const { useState } = React;
  const profiles = getProfiles();
  const [newName, setNewName] = useState('');
  const [newKey, setNewKey] = useState('');
  const [creating, setCreating] = useState(profiles.length === 0);
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  async function handleCreate() {
    if (!newName.trim()) { setErr('Enter a name.'); return; }
    if (!newKey.trim().startsWith('sk-ant-')) { setErr('Key should start with sk-ant-'); return; }
    setBusy(true); setErr('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':newKey.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
      });
      if (!res.ok) { const t=await res.text(); throw new Error('Key rejected: '+t.slice(0,100)); }
      const id = createProfile(newName.trim(), newKey.trim());
      store.set('cave_api_key', newKey.trim());
      onSelect(id, newName.trim());
    } catch(e) { setErr(e.message); } finally { setBusy(false); }
  }

  return (
    <div style={{background:'#161c2e',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',maxWidth:440,margin:'0 auto'}}>
      <style>{CSS}</style>
      <div style={{fontSize:52,marginBottom:16}}>🍷</div>
      <div className="di" style={{color:'#f0ead8',fontSize:34,marginBottom:6}}>Cave</div>
      <div style={{color:'#5a6480',fontSize:13,marginBottom:32}}>Your personal wine cellar</div>

      {!creating && profiles.length > 0 ? (
        <div style={{width:'100%'}}>
          <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.1em',marginBottom:10}}>SELECT PROFILE</div>
          {profiles.map(p=>(
            <button key={p.id} onClick={()=>onSelect(p.id, p.name)}
              style={{width:'100%',background:'#1e2640',border:'0.5px solid #2d3654',borderRadius:12,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',marginBottom:8,textAlign:'left'}}>
              <div style={{width:38,height:38,borderRadius:'50%',background:'#252d4a',border:'0.5px solid #3a4468',display:'flex',alignItems:'center',justifyContent:'center',color:'#c4a44a',fontSize:16,fontWeight:600,flexShrink:0}}>
                {p.name.charAt(0).toUpperCase()}
              </div>
              <div>
                <div style={{color:'#f0ead8',fontSize:15,fontWeight:500}}>{p.name}</div>
                <div style={{color:'#5a6480',fontSize:11,marginTop:2}}>Cave profile</div>
              </div>
              <div style={{marginLeft:'auto',color:'#c4a44a',fontSize:18}}>›</div>
            </button>
          ))}
          <button className="gbtn" style={{marginTop:8}} onClick={()=>setCreating(true)}>+ Add new profile</button>
        </div>
      ) : (
        <div style={{width:'100%',background:'#1e2640',border:'0.5px solid #2d3654',borderRadius:16,padding:24}}>
          <div style={{color:'#f0ead8',fontSize:16,fontWeight:500,marginBottom:16}}>
            {profiles.length===0 ? 'Create your profile' : 'New profile'}
          </div>
          <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.08em',marginBottom:5}}>YOUR NAME</div>
          <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Alok" style={{marginBottom:12}}/>
          <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.08em',marginBottom:5}}>ANTHROPIC API KEY</div>
          <input type="password" value={newKey} onChange={e=>setNewKey(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleCreate()} placeholder="sk-ant-api03-..." style={{marginBottom:8}}/>
          <div style={{color:'#5a6480',fontSize:11,marginBottom:14,lineHeight:1.7}}>
            Get key at <a href="https://console.anthropic.com/keys" target="_blank" style={{color:'#c4a44a'}}>console.anthropic.com/keys</a>. Stored only on this device.
          </div>
          {err&&<div className="err" style={{marginBottom:12}}>{err}</div>}
          <button className="btn" onClick={handleCreate} disabled={!newName.trim()||!newKey.trim()||busy}>
            {busy?'Verifying…':'Create profile & open Cave'}
          </button>
          {profiles.length>0&&<button className="gbtn" style={{marginTop:8}} onClick={()=>setCreating(false)}>Cancel</button>}
        </div>
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const { useState } = React;
  const [profileId, setProfileId] = useState(() => {
    const id = getCurrentProfileId();
    const profiles = getProfiles();
    if (id && profiles.find(p=>p.id===id)) return id;
    if (profiles.length===1) return profiles[0].id;
    return '';
  });
  const [profileName, setProfileName] = useState(() => {
    const id = getCurrentProfileId();
    const profiles = getProfiles();
    const p = profiles.find(x=>x.id===id);
    return p ? p.name : '';
  });

  function handleSelect(id, name) {
    setCurrentProfileId(id);
    buildStorage(id);
    setProfileId(id);
    setProfileName(name);
  }

  function handleSwitch() {
    setProfileId('');
    setProfileName('');
  }

  if (!profileId) {
    return <ProfileSelect onSelect={handleSelect}/>;
  }

  return <Cave profileId={profileId} profileName={profileName} onSwitchProfile={handleSwitch}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
