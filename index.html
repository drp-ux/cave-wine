const pillCls = t => { const s=(t||'').toLowerCase(); if(s==='red')return'pill pr'; if(s==='white')return'pill pw'; if(s==='sparkling')return'pill ps'; if(s==='rosé'||s==='rose')return'pill prs'; return 'pill pw'; };
const statusCls = s => {
  const n = normalizeStatus(s);
  if (n==='drink now'||n==='drink soon'||n==='peak') return 'bdrink';
  if (n==='past peak') return 'bdanger';
  return 'bhold';
};
const statusLabel = s => normalizeStatus(s);
const wineEmoji = t => ({'red':'🍷','white':'🍾','sparkling':'🥂','rosé':'🌸','rose':'🌸','dessert':'🍯','fortified':'🥃'}[(t||'').toLowerCase()]||'🍷');
const avg = w => {
  if (w.priceMedian) return parseFloat(w.priceMedian);
  const lo = parseFloat(w.retailPriceLow) || 0;
  const hi = parseFloat(w.retailPriceHigh) || 0;
  if (lo && hi) return (lo + hi) / 2;
  if (lo) return lo;
  if (hi) return hi;
  return 0;
};

// Normalize any status string → one of 5 canonical values
function normalizeStatus(raw) {
  const s = (raw||'').toLowerCase();
  // Past peak first
  if (s.includes('past peak') || s.includes('over the hill') || s.includes('past its')) return 'past peak';
  // Hold signals — check BEFORE drink-now so "drinkable now, but benefits from aging" → hold
  if ((s.includes('drinkable now') || s.includes('drink now') || s.includes('approachable')) &&
      (s.includes('but') || s.includes('age') || s.includes('cellar') || s.includes('hold') || s.includes('benefit'))) return 'hold';
  // Drink soon
  if (s.includes('soon') || s.includes('drink soon')) return 'drink soon';
  // Peak (but not past peak)
  if (s.includes('peak') && !s.includes('past')) return 'peak';
  // Drink now variants
  if (s.includes('drink now') || s.includes('drink') || s.includes('ready') ||
      s.includes('drinkable now') || s.includes('approachable') || s.includes('drinking')) return 'drink now';
  // Hold / cellar
  if (s.includes('hold') || s.includes('cellar') || s.includes('age')) return 'hold';
  // Unknown / anything else → hold (conservative)
  return 'hold';
}

function compressImage(dataUrl, maxDim=1400) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',0.82));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function makeThumbnail(dataUrl, size=140) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const s = Math.min(size/img.width, size/img.height);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',0.75));
    };
    img.onerror = () => resolve('');
    img.src = dataUrl;
  });
}

// Profile-aware storage: cave:{profileId}:wine:{id}
function getProfilePrefix(profileId) { return `cave:${profileId}:`; }

const store = {
  get: k => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k, typeof v==='string'?v:JSON.stringify(v)); return true; } catch { return false; } },
  del: k => { try { localStorage.removeItem(k); return true; } catch { return false; } },
  keys: prefix => { try { return Object.keys(localStorage).filter(k=>k.startsWith(prefix)); } catch { return []; } }
};

// window.storage adapter (used by Cave's internal loadCellar/saveWine etc.)
function buildStorage(profileId) {
  const prefix = getProfilePrefix(profileId);
  window.storage = {
    list: async p => ({ keys: store.keys(prefix+(p||'')).map(k => k.slice(prefix.length)) }),
    get: async k => { const v=store.get(prefix+k); if(v===null) throw new Error('not found'); return {value:v}; },
    set: async (k,v) => { store.set(prefix+k, v); return {key:k,value:v}; },
    delete: async k => { store.del(prefix+k); return {key:k,deleted:true}; }
  };
}

function createProfile(name, apiKey) {
  const id = Date.now().toString();
  const profiles = getProfiles();
  profiles.push({ id, name, createdAt: Date.now() });

function getApiKey(profileId) {
  return store.get(`cave_key_${profileId}`) || store.get('cave_api_key') || '';
}

async function callAPI(messages, profileId, useSearch=false) {
  const apiKey = getApiKey(profileId);
  if (!apiKey) throw new Error('No API key — go to Settings.');
  const body = {
    model: 'claude-haiku-4-5-20251001',
    max_tokens: 1500,
    messages
  };
  if (useSearch) {
    body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
    body.max_tokens = 2000;
  }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });
  const raw = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${raw.slice(0,200)}`);
  let data;
  try { data = JSON.parse(raw); } catch { throw new Error(`Bad response: ${raw.slice(0,100)}`); }
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  if (data.stop_reason === 'tool_use') {
    // Web search executed server-side — re-extract text from all blocks
    const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if (txt) return txt;
  }
  const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  if (!txt) throw new Error('Empty response from API');
  return txt;
}

function parseJSON(txt) {
  const fence = txt.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) return JSON.parse(fence[1].trim());
  const s = txt.indexOf('{'), e = txt.lastIndexOf('}');
  if (s !== -1 && e > s) return JSON.parse(txt.slice(s, e+1));
  throw new Error(`No JSON found: ${txt.slice(0,120)}`);
}

function imgToBase64(dataUrl) {
  return dataUrl.split(',')[1];
}

async function identifyWine(frontDataUrl, backDataUrl, manualText, profileId) {
  const prompt = `You are an expert sommelier with access to a comprehensive wine database. Analyze the wine label image(s) provided and identify the wine.

CRITICAL RULES:
1. ALWAYS return a best guess — never refuse or say you cannot identify it
2. If the label is partially readable, use what you can see plus your wine knowledge
3. Only set identified:false if the image is completely unreadable (solid blur, no text at all)
4. Use confidence: "high" (you're certain), "medium" (likely correct), "low" (best guess)
5. When confidence is medium or low, populate the alternatives array

Return ONLY a raw JSON object, nothing before or after it:

{"identified":true,"confidence":"high","producer":"exact producer","wineName":"exact wine or cuvee name","vintage":"2021","region":"region, country","appellation":"Barolo DOCG","grapeVarieties":["Nebbiolo"],"wineType":"red","style":"Full-bodied, tannic","retailPriceLow":45,"retailPriceHigh":65,"priceNote":"US retail varies","tastingNotes":{"nose":"aromas","palate":"flavors and texture","finish":"finish"},"drinkingWindow":{"status":"hold","start":"2027","end":"2038","recommendation":"Hold 3-5 more years, peak 2028-2032"},"cellaring":{"shouldCellar":true,"yearsToHold":"3-5 years","storageNotes":"55F, 70% humidity"},"servingTemp":"62-65F","decantingAdvice":"Decant 2 hours","alternatives":[]}

For alternatives (when not high confidence): [{"producer":"...","wineName":"...","vintage":"...","region":"...","reason":"why it could be this"}]
wineType must be: red | white | rose | sparkling | dessert | fortified
Current year: 2026. Realistic US retail prices.
If truly unreadable image only: {"identified":false,"reason":"specific reason"}`;

  const content = [];

  // Add front image if available
  if (frontDataUrl) {
    content.push({
      type: 'image',
      source: { type: 'base64', media_type: 'image/jpeg', data: imgToBase64(frontDataUrl) }
    });
  }

  // Add back image if available
  if (backDataUrl) {
    content.push({
      type: 'image',
      source: { type: 'base64', media_type: 'image/jpeg', data: imgToBase64(backDataUrl) }
    });
  }

  // Add any manual text the user typed
  const textPrompt = manualText
    ? `${prompt}\n\nAdditional text from the user about this label: "${manualText}"`
    : prompt;

  content.push({ type: 'text', text: textPrompt });

  const txt = await callAPI([{ role: 'user', content }], profileId, false);
  return parseJSON(txt);
}

async function getRecommendations(description, cellar, profileId) {
  const list = cellar.map((w,i) =>
    `${i+1}. ${w.producer} "${w.wineName}" ${w.vintage} — ${w.wineType}, ${(w.grapeVarieties||[]).join('/')} — ${w.drinkingWindow?.status||'unknown'} — ${w.bottles} btl`
  ).join('\n');
  const prompt = `You are an expert sommelier. The host says: "${description}"\n\nTheir cellar:\n${list}\n\nRecommend 1-3 wines that best fit tonight. Prioritize drink-now/soon/peak. Return ONLY a JSON array:\n[{"index":1,"reason":"why this wine fits perfectly"}]\n\nIf none are ready, return [].`;
  const txt = await callAPI([{ role: 'user', content: prompt }], profileId, false);
  const m = txt.match(/\[[\s\S]*\]/);
  if (!m) return [];
  return JSON.parse(m[0]);
}

async function fetchLivePrice(producer, wineName, vintage, profileId) {
  const apiKey = getApiKey(profileId);
  if (!apiKey) throw new Error('No API key');

  // Build Wine-Searcher URLs to search
  const exactQuery  = encodeURIComponent([producer, wineName, vintage].filter(Boolean).join(' '));
  const broadQuery  = encodeURIComponent([producer, wineName].filter(Boolean).join(' '));
  const wsExactUrl  = `https://www.wine-searcher.com/find/${exactQuery}/1/usa`;
  const wsBroadUrl  = `https://www.wine-searcher.com/find/${broadQuery}/1/usa`;

  const prompt = `You must use the web_search tool to look up real current retail prices for this wine on Wine-Searcher.

Wine to price: ${producer} ${wineName} ${vintage}

STEP 1 — Search for the exact wine and vintage:
Search URL: ${wsExactUrl}
OR search query: "site:wine-searcher.com ${producer} ${wineName} ${vintage} price"

STEP 2 — If exact vintage has fewer than 3 listings, also search the broader wine:
Search URL: ${wsBroadUrl}

STEP 3 — Extract the ACTUAL prices you see in the search results. Do NOT use your training data or make up prices. Only report prices that appear in the search results.

Return ONLY a raw JSON object:
{"priceLow":198,"priceHigh":265,"priceMedian":218,"listingsFound":14,"priceNote":"Wine-Searcher: 14 US listings for ${producer} ${wineName} ${vintage}, April 2026","confidence":"high","searchedExactVintage":true}

Rules:
- priceLow = cheapest US listing found on Wine-Searcher
- priceHigh = most expensive US listing found  
- priceMedian = middle price (what most people would pay)
- listingsFound = number of US merchant listings found
- searchedExactVintage = true if ${vintage} listings found, false if used broader search
- confidence: "high" (5+ listings), "medium" (2-4 listings), "low" (1 listing)
- If Wine-Searcher shows NO listings at all: {"priceLow":null,"priceHigh":null,"priceMedian":null,"listingsFound":0,"priceNote":"No Wine-Searcher US listings found for ${producer} ${wineName}","confidence":"none","searchedExactVintage":false}
- CRITICAL: Do not guess or use training data prices. Only report what Wine-Searcher actually shows.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 1500,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const raw = await res.text();
  if (!res.ok) throw new Error(`Price lookup HTTP ${res.status}: ${raw.slice(0,150)}`);
  const data = JSON.parse(raw);
  if (data.error) throw new Error(data.error.message || 'Price lookup API error');
  const txt = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
  if (!txt) throw new Error('Empty price response');
  return parseJSON(txt);
}

async function compressForVision(dataUrl, maxDim=1200) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim/Math.max(img.width,img.height));

}

function GainLoss({ paid, retail }) {
  const gain = retail - paid;
  const pct  = Math.round(Math.abs(gain / paid) * 100);
  const up   = gain >= 0;
  return (
    <div style={{textAlign:'right'}}>
      <div style={{color: up ? '#4a9e6a' : '#c44a4a', fontSize:16, fontWeight:600}}>
        {up ? '+' : '-'}${Math.abs(Math.round(gain))}
      </div>
      <div style={{color: up ? '#4a9e6a' : '#c44a4a', fontSize:11}}>
        {up ? '▲' : '▼'} {pct}% vs retail
      </div>
    </div>
  );
}

  const [logRating, setLogRating] = useState(0);
  const [filterType, setFilterType] = useState('all');
  const [sortBy, setSortBy] = useState('type');
  const [searchQuery, setSearchQuery] = useState('');
  const [concText, setConcText] = useState('');
  const [recs, setRecs] = useState(null);
  const [notesDraft, setNotesDraft] = useState('');
  const [editNotes, setEditNotes] = useState(false);
  const [showArchive, setShowArchive] = useState(false);
  const [archive, setArchive] = useState([]);
  const [editPending, setEditPending] = useState(null);
  const [editPurchase, setEditPurchase] = useState(false);
  const [confirmPermDelete, setConfirmPermDelete] = useState(false);
  const [draftPurchasePrice, setDraftPurchasePrice] = useState('');
  const [draftPurchaseWhere, setDraftPurchaseWhere] = useState('');
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [purchasePrice, setPurchasePrice] = useState('');
  const [purchaseWhere, setPurchaseWhere] = useState('');
  

  // File input refs — must be at top level (Rules of Hooks)
  const { useRef } = React;
  const frontCamRef    = useRef(null);
  const csvImportRef   = useRef(null);
  const frontLibRef    = useRef(null);
  const retakeFrontRef = useRef(null);

  const sel = cellar.find(w => w.id === selId);
  const stats = {
    bottles: cellar.reduce((s,w)=>s+(w.bottles||0),0),
    value: Math.round(cellar.reduce((s,w)=>s+(w.bottles||0)*avg(w),0)),
    ready: cellar.filter(w=>statusCls(w.drinkingWindow?.status||'')==='bdrink').length
  };

  useEffect(() => { buildStorage(profileId); loadCellar(); loadArchive(); }, [profileId]);

  async function loadCellar() {
    try {
      const res = await window.storage.list('wine:');
      if (!res?.keys?.length) { setCellar([]); return; }
      const wines = [];
      for (const key of res.keys) {
        try { const r = await window.storage.get(key); if (r) wines.push(JSON.parse(r.value)); } catch {}
      }
      wines.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
      setCellar(wines);
    } catch { setCellar([]); }
  }

  async function loadArchive() {
    try {
      const res = await window.storage.list('archive:');
      if (!res?.keys?.length) { setArchive([]); return; }
      const entries = [];
      for (const key of res.keys) {
        try { const r = await window.storage.get(key); if (r) entries.push(JSON.parse(r.value)); } catch {}
      }
      entries.sort((a,b)=>(b.archivedAt||0)-(a.archivedAt||0));
      setArchive(entries);
    } catch { setArchive([]); }
  }

  async function saveWine(wine) { await window.storage.set(`wine:${wine.id}`, JSON.stringify(wine)); await loadCellar(); }
  async function removeWine(id) { await window.storage.delete(`wine:${id}`); await loadCellar(); }

  async function loadArchive() {
    try {
      const res = await window.storage.list('archive:');
      if (!res?.keys?.length) { setArchive([]); return; }
      const wines = [];
      for (const key of res.keys) {
        try { const r = await window.storage.get(key); if (r) wines.push(JSON.parse(r.value)); } catch {}
      }
      wines.sort((a,b)=>(b.archivedAt||0)-(a.archivedAt||0));
      setArchive(wines);
    } catch { setArchive([]); }
  }

  async function archiveWine(wine, reason, logEntry) {
    const record = {
      ...wine,
      archivedAt: Date.now(),
      archiveReason: reason,
      finalLog: logEntry || null,
    };
    await window.storage.set(`archive:${wine.id}`, JSON.stringify(record));
    await removeWine(wine.id);
    await loadArchive();
  }

  function resetScan() { setFrontImg(null); setManualText(''); setPending(null); setError(''); }
  function goScan() { resetScan(); setView('scan'); }

  async function handlePhoto(e) {
    const file = e.target.files?.[0]; e.target.value='';
    if (!file) return;
    setError('');
    const reader = new FileReader();
    reader.onload = async () => {
      const compressed = await compressForVision(reader.result);
      setFrontImg(compressed);
    };
    reader.readAsDataURL(file);
  }

  async function runIdentification() {
    if (!frontImg && !manualText.trim()) { setError('Add a front label photo or type the wine details.'); return; }
    setView('scanning'); setLoadMsg('Identifying wine…'); setError('');
    setLoading(true);
    try {
      const wine = await identifyWine(frontImg, null, manualText, profileId);
      if (wine.identified) {
        setLoadMsg('Fetching live prices from Wine-Searcher…');
        try {
          const priceData = await fetchLivePrice(wine.producer, wine.wineName, wine.vintage, profileId);
          if (priceData.listingsFound > 0) {
            wine.retailPriceLow   = priceData.priceLow;
            wine.retailPriceHigh  = priceData.priceHigh;
            wine.priceMedian      = priceData.priceMedian;
            wine.priceNote        = priceData.priceNote;
            wine.priceSources     = priceData.sources || [];
            wine.priceListings    = priceData.listingsFound;
            wine.priceConfidence  = priceData.confidence;
            wine.livePriceFetched = true;
          } else {
            wine.priceNote        = `No Wine-Searcher US listings found — price is Claude's estimate`;
            wine.livePriceFetched = false;
          }
        } catch(priceErr) {
          wine.priceNote        = `Price estimate (Wine-Searcher lookup unavailable)`;
          wine.livePriceFetched = false;
        }
        // Always show is-this-right — high confidence gets a ✓ badge, still lets user set qty & purchase info
        setPending(wine); setPendingQty(1); setView('is-this-right');
      } else {
        setError(wine.reason || 'Could not identify wine.');
        setView('scan');
      }
    } catch(err) {
      setError(err.message || 'Identification failed.');
      setView('scan');
    } finally { setLoading(false); }
  }

  async function confirmAdd(wineData) {
    const w = wineData || pending; if (!w) return;
    let thumb = '';
    if (frontImg) {
      thumb = await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const s = Math.min(140/img.width, 140/img.height);
          const c = document.createElement('canvas');
          c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
          c.getContext('2d').drawImage(img,0,0,c.width,c.height);
          resolve(c.toDataURL('image/jpeg',0.75));
        };
        img.onerror = () => resolve('');
        img.src = frontImg;
      });
    }
    const existing = cellar.find(x => x.producer===w.producer && x.wineName===w.wineName && x.vintage===w.vintage);
    if (existing) {
      await saveWine({ ...existing, bottles: (existing.bottles||0)+pendingQty });
    } else {
      const id = Date.now().toString();
      await saveWine({ id, ...w, bottles: pendingQty, myNotes: '', rating: 0, image: thumb, addedAt: Date.now(), drinkLog: [],
        purchasePrice: purchasePrice ? parseFloat(purchasePrice) : null,
        purchaseWhere: purchaseWhere || null });
    }
    setPurchasePrice(''); setPurchaseWhere(''); setEditPending(null); setShowAdvanced(false); resetScan(); setView('home');
  }

  async function confirmLog() {
    if (!sel) return;
    if (logAction==='permdelete') {
      await removeWine(sel.id);
      setSelId(null); setLogAction(''); setView('cellar'); return;
    }
    if (logAction==='delete') {
      // Archive the wine record before removing
      const archiveEntry = { ...sel, archivedAt: Date.now(), archiveReason: 'removed' };
      await window.storage.set(`archive:${sel.id}`, JSON.stringify(archiveEntry));
      await removeWine(sel.id);
      await loadArchive();
      setSelId(null); setLogAction(''); setView('cellar'); return;
    }
    const entry = { date: new Date().toLocaleDateString(), type: logAction, notes: logNotes, rating: logRating };
    const newBottles = Math.max(0,(sel.bottles||0)-1);
    const updatedWine = { ...sel, bottles: newBottles, drinkLog: [entry,...(sel.drinkLog||[])] };
    await saveWine(updatedWine);
    // Auto-archive when last bottle is logged
    if (newBottles === 0) {
      const archiveEntry = { ...updatedWine, archivedAt: Date.now(), archiveReason: logAction };
      await window.storage.set(`archive:${sel.id}`, JSON.stringify(archiveEntry));
      await loadArchive();
    }
    setLogAction(''); setLogNotes(''); setLogRating(0); setView('detail');
  }

  async function adjustQty(delta) { if (!sel) return; await saveWine({ ...sel, bottles: Math.max(0,(sel.bottles||0)+delta) }); }
  async function savePurchaseInfo() {
    if (!sel) return;
    await saveWine({ ...sel,
      purchasePrice: draftPurchasePrice ? parseFloat(draftPurchasePrice) : null,
      purchaseWhere: draftPurchaseWhere || null
    });
    setEditPurchase(false);
  }
  async function saveMyNotes() { if (!sel) return; await saveWine({ ...sel, myNotes: notesDraft }); setEditNotes(false); }

  async function runConcierge() {
    if (!concText.trim()||!cellar.length) return;
    setLoading(true); setError(''); setRecs(null);
    try {
      const idxs = await getRecommendations(concText, cellar, profileId);
      setRecs(idxs.map(r=>({ wine: cellar[r.index-1], reason: r.reason })).filter(r=>r.wine));
    } catch(err) { setError(err.message); } finally { setLoading(false); }
  }

  const filteredCellar = cellar
    .filter(w=>{
      if (filterType!=='all' && (w.wineType||'').toLowerCase()!==filterType) return false;
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        return (w.producer||'').toLowerCase().includes(q) ||
               (w.wineName||'').toLowerCase().includes(q) ||
               (w.vintage||'').toString().includes(q) ||
               (w.region||'').toLowerCase().includes(q) ||
               (w.grapeVarieties||[]).join(' ').toLowerCase().includes(q);
      }
      return true;
    })
    .sort((a,b)=>{
      if(sortBy==='type') return (a.wineType||'').localeCompare(b.wineType||'');
      if(sortBy==='varietal') return ((a.grapeVarieties||[])[0]||'').localeCompare((b.grapeVarieties||[])[0]||'');
      if(sortBy==='price↑') return avg(a)-avg(b);
      if(sortBy==='price↓') return avg(b)-avg(a);
      if(sortBy==='drink') return (a.drinkingWindow?.start||'9999').localeCompare(b.drinkingWindow?.start||'9999');
      return 0;
    });

  function Nav({ cur }) {
    return (
      <div className="nav">
        {[['home','⌂','Home'],['cellar','▤','Cellar'],['grid','◈','Value'],['concierge','✦','Concierge'],['settings','◎','Settings']].map(([v,ic,lb])=>(
          <button key={v} className={`nb ${cur===v?'nbon':''}`} onClick={()=>{if(v==='concierge')setRecs(null);setView(v);}}>
            <span style={{fontSize:16}}>{ic}</span>{lb}<span className={`ndot ${cur===v?'ndoton':''}`}/>
          </button>
        ))}
      </div>
    );
  }

  const wrap = (content, cur='') => (
    <div style={{background:'#161c2e',minHeight:'100vh',display:'flex',flexDirection:'column',maxWidth:440,margin:'0 auto'}}>
      <style>{CSS}</style>
      {content}
      <Nav cur={cur}/>
    </div>
  );

  const InstallBanner = () => !isPWA() ? (
    <div style={{margin:'0 16px 12px',background:'#251f0e',border:'0.5px solid #3d3015',borderRadius:12,padding:'10px 14px',display:'flex',gap:10,alignItems:'center'}}>
      <div style={{fontSize:18,flexShrink:0}}>📲</div>
      <div style={{flex:1}}>
        <div style={{color:'#c4a44a',fontSize:12,fontWeight:600,marginBottom:1}}>Install for persistent storage</div>
        <div style={{color:'#8a7a50',fontSize:11,lineHeight:1.4}}>Safari Share → Add to Home Screen. Prevents data loss.</div>
      </div>
    </div>
  ) : null;

  // ── HOME ──────────────────────────────────────────────────────────────────
  if (view==='home') return wrap(<>
    <div style={{padding:'20px 16px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div>
        <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.12em',marginBottom:2}}>YOUR</div>
        <div className="di" style={{color:'#f0ead8',fontSize:28}}>Cave</div>
      </div>
      <button onClick={onSwitchProfile} style={{background:'#252d4a',border:'0.5px solid #3a4468',borderRadius:'50%',width:38,height:38,display:'flex',alignItems:'center',justifyContent:'center',color:'#c4a44a',fontSize:14,fontWeight:600,cursor:'pointer'}}>
        {(profileName||'?').charAt(0).toUpperCase()}
      </button>
    </div>
    <div style={{padding:'0 16px 14px',display:'flex',gap:8}}>
      {[{label:'BOTTLES',val:stats.bottles,color:'#f0ead8'},{label:'VALUE',val:stats.value>0?`$${stats.value.toLocaleString()}`:'—',color:'#c4a44a'},{label:'READY',val:stats.ready,color:'#4a9e6a'}].map(s=>(
        <div key={s.label} className="card" style={{flex:1,textAlign:'center',padding:12}}>
          <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.06em',marginBottom:4}}>{s.label}</div>
          <div className="df" style={{color:s.color,fontSize:22}}>{s.val}</div>
        </div>
      ))}
    </div>
    <InstallBanner/>
    <div style={{padding:'0 16px',flex:1,overflowY:'auto'}}>
      {cellar.length===0?(
        <div style={{textAlign:'center',padding:'48px 0'}}>
          <div style={{fontSize:40,marginBottom:14}}>🍷</div>
          <div className="di" style={{color:'#8a96b8',fontSize:20,marginBottom:8}}>Your cave is empty.</div>
          <div style={{color:'#5a6480',fontSize:13}}>Scan your first bottle to begin.</div>
        </div>
      ):cellar.slice(0,8).map(w=>(
        <div key={w.id} className="row" onClick={()=>{setSelId(w.id);setView('detail');}}>
          <div style={{width:34,height:46,borderRadius:5,background:'#252d4a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,overflow:'hidden'}}>
            {w.image?<img src={w.image} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:4}}/>:wineEmoji(w.wineType)}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:'#f0ead8',fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{w.producer}</div>
            <div style={{color:'#5a6480',fontSize:11,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{w.wineName} {w.vintage} · <span style={{color:'#8a96b8'}}>{w.bottles} btl</span></div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{color:'#c4a44a',fontSize:13}}>${Math.round(avg(w))}</div>
            <div className={statusCls(w.drinkingWindow?.status)} style={{marginTop:4}}>{statusLabel(w.drinkingWindow?.status)||'—'}</div>
          </div>
        </div>
      ))}
      {cellar.length>8&&<div style={{color:'#5a6480',fontSize:11,textAlign:'center',padding:'10px 0'}}>+{cellar.length-8} more · see Cellar tab</div>}
    </div>
    <div style={{padding:'10px 16px'}}><button className="btn" onClick={goScan}>+ Scan new bottle</button></div>
  </>, 'home');

  // ── SCAN ─────────────────────────────────────────────────────────────────
  if (view==='scan') return wrap(<>
    <input ref={frontCamRef} type="file" accept="image/*" capture="environment" onChange={e=>handlePhoto(e)}
      style={{opacity:0,position:'fixed',top:-100,left:-100,width:1,height:1}}/>
    <input ref={frontLibRef} type="file" accept="image/*" onChange={e=>handlePhoto(e)}
      style={{opacity:0,position:'fixed',top:-100,left:-100,width:1,height:1}}/>
    <input ref={retakeFrontRef} type="file" accept="image/*" capture="environment" onChange={e=>handlePhoto(e)}
      style={{opacity:0,position:'fixed',top:-100,left:-100,width:1,height:1}}/>

    <div style={{padding:'18px 16px 12px',display:'flex',alignItems:'center',gap:10}}>
      <button className="back" onClick={()=>setView('home')}>←</button>
      <span className="di" style={{color:'#f0ead8',fontSize:18}}>Add to cave</span>
    </div>

    <div style={{padding:'0 16px',flex:1,overflowY:'auto'}}>
      <div style={{marginBottom:14}}>
        <div className="sec">LABEL PHOTO <span style={{color:'#c44a4a'}}>*</span></div>
        {frontImg ? (
          <div style={{position:'relative',borderRadius:12,overflow:'hidden',border:'0.5px solid #c4a44a',marginBottom:4}}>
            <img src={frontImg} style={{width:'100%',maxHeight:220,objectFit:'contain',display:'block'}}/>
            <div style={{position:'absolute',top:8,left:8,background:'#0e2318',border:'0.5px solid #1a3d28',borderRadius:20,padding:'3px 10px',color:'#4a9e6a',fontSize:11}}>✓ Photo ready</div>
            <button onClick={()=>retakeFrontRef.current&&retakeFrontRef.current.click()}
              style={{position:'absolute',bottom:8,right:8,background:'rgba(22,28,46,0.9)',border:'0.5px solid #3a4468',borderRadius:8,padding:'6px 12px',color:'#c4a44a',fontSize:12,cursor:'pointer'}}>
              Retake
            </button>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <button onClick={()=>frontCamRef.current&&frontCamRef.current.click()}
              style={{background:'#1e2640',border:'1.5px dashed #3a4468',borderRadius:12,padding:'28px 0',display:'flex',flexDirection:'column',alignItems:'center',gap:8,cursor:'pointer'}}>
              <div style={{fontSize:32}}>📷</div>
              <div style={{color:'#8a96b8',fontSize:13}}>Camera</div>
            </button>
            <button onClick={()=>frontLibRef.current&&frontLibRef.current.click()}
              style={{background:'#1e2640',border:'1.5px dashed #3a4468',borderRadius:12,padding:'28px 0',display:'flex',flexDirection:'column',alignItems:'center',gap:8,cursor:'pointer'}}>
              <div style={{fontSize:32}}>🖼</div>
              <div style={{color:'#8a96b8',fontSize:13}}>Library</div>
            </button>
          </div>
        )}
      </div>

      <div style={{marginBottom:16}}>
        <div className="sec">LABEL TEXT <span style={{color:'#5a6480',fontStyle:'italic',letterSpacing:'normal',textTransform:'none',fontSize:10}}>optional · improves accuracy</span></div>
        <textarea value={manualText} onChange={e=>setManualText(e.target.value)} rows={2}
          placeholder={"e.g. Cerbaiona Brunello di Montalcino 2020, Tuscany, Italy"}
          style={{fontSize:13}}/>
      </div>

      {error && (
        <div style={{padding:'12px 14px',background:'#1a0e0e',border:'0.5px solid #4a2020',borderRadius:10,marginBottom:12}}>
          <div style={{color:'#c44a4a',fontSize:12,marginBottom:6,fontWeight:600}}>Couldn't identify — try:</div>
          <div style={{color:'#8a6060',fontSize:12,lineHeight:1.8}}>
            • Type the wine name in the text box<br/>
            • Tap Identify again<br/>
            • Check lighting on the label
          </div>
        </div>
      )}

      <button className="btn" onClick={runIdentification} disabled={loading||(!frontImg&&!manualText.trim())} style={{marginBottom:8}}>
        {loading ? 'Identifying…' : '🔍 Identify wine'}
      </button>
      <div style={{color:'#5a6480',fontSize:11,textAlign:'center',marginBottom:4}}>
        {frontImg ? 'Photo ready ✓' : 'Add a photo or type the wine details'}
      </div>
      <div style={{height:16}}/>
    </div>
  </>, '');

  // ── SCANNING ──────────────────────────────────────────────────────────────
  if (view==='scanning') return (
    <div style={{background:'#161c2e',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',maxWidth:440,margin:'0 auto'}}>
      <style>{CSS}</style>
      <div style={{fontSize:48,marginBottom:18}}>🍷</div>
      <div className="di" style={{color:'#8a96b8',fontSize:22,marginBottom:8}}>{loadMsg}</div>
      <div style={{color:'#5a6480',fontSize:12,textAlign:'center',lineHeight:1.7}}>Claude is reading the label…</div>
      <div style={{width:160,height:2,background:'#1e2640',borderRadius:2,overflow:'hidden',marginTop:28}}>
        <div style={{height:'100%',background:'linear-gradient(90deg,#c4a44a,#e8c870)',borderRadius:2,width:'70%'}}/>
      </div>
    </div>
  );

  // ── IS THIS RIGHT? ────────────────────────────────────────────────────────
  if (view==='is-this-right' && pending) {
    const p = editPending || pending;
    const isEditing = !!editPending;

    return wrap(<>
      <div style={{padding:'18px 16px 10px',display:'flex',alignItems:'center',gap:10}}>
        <button className="back" onClick={()=>{setView('scan');setEditPending(null);}}>←</button>
        <span className="di" style={{color:'#f0ead8',fontSize:18}}>Is this right?</span>
        <div style={{marginLeft:'auto'}}>
          <span className={statusCls(p.drinkingWindow?.status||'')} style={{fontSize:10,letterSpacing:'.04em'}}>
            {(p.confidence||'?').toUpperCase()}
          </span>
        </div>
      </div>

      <div style={{padding:'0 16px',flex:1,overflowY:'auto'}}>
        {frontImg&&(
          <div style={{borderRadius:10,overflow:'hidden',maxHeight:130,marginBottom:12,border:'0.5px solid #2d3654'}}>
            <img src={frontImg} style={{width:'100%',objectFit:'contain',maxHeight:130}}/>
          </div>
        )}

        {!isEditing ? <>
          {/* Main identification result */}
          <div className="card" style={{marginBottom:10}}>
            <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.1em',marginBottom:2}}>{(p.producer||'').toUpperCase()}</div>
            <div className="di" style={{color:'#f0ead8',fontSize:22,lineHeight:1.2,marginBottom:4}}>{p.wineName}</div>
            <div style={{color:'#8a96b8',fontSize:12}}>{p.vintage}{p.region?` · ${p.region}`:''}</div>
            {p.appellation&&<div style={{color:'#5a6480',fontSize:11,marginTop:2}}>{p.appellation}</div>}
            <div style={{marginTop:8,display:'flex',gap:4,flexWrap:'wrap'}}>
              {(p.grapeVarieties||[]).map(g=><span key={g} className={pillCls(p.wineType)}>{g}</span>)}
            </div>
          </div>

          {/* Alternatives if not high confidence */}
          {(p.alternatives||[]).length>0&&(
            <div className="card" style={{marginBottom:10}}>
              <div className="sec">COULD ALSO BE…</div>
              {(p.alternatives||[]).map((alt,i)=>(
                <div key={i} onClick={()=>{setPending({...p,...alt,alternatives:[]});setEditPending(null);}}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<p.alternatives.length-1?'0.5px solid #2d3654':'none',cursor:'pointer'}}>
                  <div style={{flex:1}}>
                    <div style={{color:'#f0ead8',fontSize:13}}>{alt.producer} {alt.wineName} {alt.vintage}</div>
                    <div style={{color:'#5a6480',fontSize:11,marginTop:2,fontStyle:'italic'}}>{alt.reason}</div>
                  </div>
                  <div style={{color:'#c4a44a',fontSize:16}}>›</div>
                </div>
              ))}
            </div>
          )}

          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <div className="card" style={{flex:1,padding:12}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                <div className="sec" style={{marginBottom:0}}>RETAIL (US)</div>
                {p.livePriceFetched
                  ? <span style={{background:'#0e2318',color:'#4a9e6a',fontSize:9,padding:'2px 6px',borderRadius:8,border:'0.5px solid #1a3d28',letterSpacing:'.04em'}}>LIVE</span>
                  : <span style={{background:'#252d4a',color:'#5a6480',fontSize:9,padding:'2px 6px',borderRadius:8,letterSpacing:'.04em'}}>EST.</span>
                }
              </div>
              {p.priceMedian
                ? <>
                    <div className="df" style={{color:'#c4a44a',fontSize:18}}>${p.priceMedian} <span style={{fontSize:13,color:'#5a6480'}}>typical</span></div>
                    <div style={{color:'#5a6480',fontSize:10,marginTop:1}}>${p.retailPriceLow}–${p.retailPriceHigh} range</div>
                  </>
                : <div className="df" style={{color:'#c4a44a',fontSize:18}}>{p.retailPriceLow&&p.retailPriceHigh?`$${p.retailPriceLow}–$${p.retailPriceHigh}`:p.priceMedian?`$${p.priceMedian}`:'—'}</div>
              }
              {p.priceSources?.length>0 && <div style={{color:'#5a6480',fontSize:10,marginTop:3}}>{p.priceListings} listings · {p.priceSources.slice(0,2).join(', ')}</div>}
              {p.priceNote && !p.livePriceFetched && <div style={{color:'#5a6480',fontSize:10,marginTop:3,fontStyle:'italic'}}>{p.priceNote}</div>}
            </div>
            <div className="card" style={{flex:1,padding:12}}>
              <div className="sec" style={{marginBottom:4}}>DRINK</div>
              <div className="df" style={{color:'#c47a2a',fontSize:13,marginBottom:4}}>{p.drinkingWindow?.start}–{p.drinkingWindow?.end}</div>
              <div className={statusCls(p.drinkingWindow?.status||'')}>{statusLabel(p.drinkingWindow?.status)}</div>
            </div>
          </div>

          <div className="card" style={{marginBottom:12}}>
            <div className="sec">HOW MANY BOTTLES?</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div style={{color:'#8a96b8',fontSize:13}}>Bottles to add</div>
              <div style={{display:'flex',alignItems:'center',gap:16}}>
                <button className="qbtn" onClick={()=>setPendingQty(q=>Math.max(1,q-1))}>−</button>
                <span className="df" style={{color:'#f0ead8',fontSize:26,minWidth:28,textAlign:'center'}}>{pendingQty}</span>
                <button className="qbtn" onClick={()=>setPendingQty(q=>q+1)}>+</button>
              </div>
            </div>
            <div style={{borderTop:'0.5px solid #2d3654',paddingTop:12}}>
              <div className="sec">PURCHASE INFO <span style={{color:'#5a6480',fontStyle:'italic',letterSpacing:'normal',textTransform:'none',fontSize:10}}>optional</span></div>
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1}}>
                  <div style={{color:'#5a6480',fontSize:10,marginBottom:4}}>WHAT I PAID ($)</div>
                  <input type="number" value={purchasePrice} onChange={e=>setPurchasePrice(e.target.value)} placeholder="e.g. 85" style={{fontSize:13}}/>
                </div>
                <div style={{flex:2}}>
                  <div style={{color:'#5a6480',fontSize:10,marginBottom:4}}>WHERE I BOUGHT IT</div>
                  <input type="text" value={purchaseWhere} onChange={e=>setPurchaseWhere(e.target.value)} placeholder="e.g. K&L Wines" style={{fontSize:13}}/>
                </div>
              </div>
            </div>
          </div>

          <button className="btn" onClick={()=>confirmAdd(p)} style={{marginBottom:8}}>
            ✓ Yes, save {pendingQty} bottle{pendingQty!==1?'s':''} to cave
          </button>
          <button className="gbtn" onClick={()=>setEditPending({...p})} style={{marginBottom:8}}>
            ✏ No — let me correct this
          </button>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <button onClick={()=>{setEditPending(null);setView('scan');}} style={{background:'none',border:'none',color:'#5a6480',fontSize:12,cursor:'pointer',padding:'8px 0'}}>
              ← Back to scan
            </button>
            <a href={`https://www.wine-searcher.com/find/${encodeURIComponent(`${p.producer} ${p.wineName} ${p.vintage}`)}`}
              target="_blank" style={{color:'#5a6480',fontSize:12,textDecoration:'underline',padding:'8px 0'}}>
              Verify on Wine-Searcher →
            </a>
          </div>

        </> : <>
          <div className="card" style={{marginBottom:10}}>
            <div className="sec" style={{marginBottom:12}}>CORRECT THE DETAILS</div>
            {[['PRODUCER','producer'],['WINE NAME','wineName'],['VINTAGE','vintage']].map(([lbl,field])=>(
              <div key={field} style={{marginBottom:10}}>
                <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.08em',marginBottom:4}}>{lbl}</div>
                <input type="text" value={p[field]||''} onChange={e=>setEditPending({...p,[field]:e.target.value})}/>
              </div>
            ))}
            <button onClick={()=>setShowAdvanced(v=>!v)}
              style={{background:'none',border:'none',color:'#5a6480',fontSize:11,cursor:'pointer',padding:'4px 0',marginBottom:showAdvanced?8:0}}>
              {showAdvanced?'▾ Hide advanced':'▸ Advanced (region, appellation, grapes)'}
            </button>
            {showAdvanced&&[['REGION','region'],['APPELLATION','appellation']].map(([lbl,field])=>(
              <div key={field} style={{marginBottom:10}}>
                <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.08em',marginBottom:4}}>{lbl}</div>
                <input type="text" value={p[field]||''} onChange={e=>setEditPending({...p,[field]:e.target.value})}/>
              </div>
            ))}
            {showAdvanced&&<div style={{marginBottom:10}}>
              <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.08em',marginBottom:4}}>GRAPE VARIETIES (comma separated)</div>
              <input type="text" value={(p.grapeVarieties||[]).join(', ')}
                onChange={e=>setEditPending({...p,grapeVarieties:e.target.value.split(',').map(s=>s.trim()).filter(Boolean)})}/>
            </div>}
          </div>
          <button className="btn" onClick={()=>{setPending(editPending);setEditPending(null);setShowAdvanced(false);}} style={{marginBottom:8}}>Save corrections</button>
          <button className="gbtn" onClick={()=>{setEditPending(null);setShowAdvanced(false);}}>Cancel</button>
        </>}
        <div style={{height:16}}/>
      </div>
    </>, '');
  }

  // ── WINE DETAIL ───────────────────────────────────────────────────────────
  if (view==='detail' && sel) return wrap(<>
    <div style={{padding:'18px 16px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <button className="back" onClick={()=>setView('cellar')}>←</button>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <button style={{background:'none',border:'none',color:'#5a6480',fontSize:12,cursor:'pointer'}}
          onClick={()=>{setLogAction('delete');setView('log');}}>Archive</button>
        <button style={{background:'none',border:'none',color:'#c44a4a',fontSize:12,cursor:'pointer'}}
          onClick={()=>setConfirmPermDelete(true)}>Delete</button>
      </div>
    </div>
    {confirmPermDelete&&(
      <div style={{position:'fixed',inset:0,background:'rgba(8,10,18,0.9)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{background:'#1e2640',border:'0.5px solid #4a2020',borderRadius:16,padding:24,width:'100%',maxWidth:360}}>
          <div style={{fontSize:28,textAlign:'center',marginBottom:10}}>🗑</div>
          <div className="di" style={{color:'#f0ead8',fontSize:20,textAlign:'center',marginBottom:6}}>Delete permanently?</div>
          <div style={{color:'#8a96b8',fontSize:13,textAlign:'center',marginBottom:20,lineHeight:1.5}}>
            <em>{sel.wineName}</em> and all its data will be gone. Cannot be undone.
          </div>
          <button className="dbtn" style={{marginBottom:8}} onClick={async()=>{await removeWine(sel.id);setConfirmPermDelete(false);setSelId(null);setView('cellar');}}>
            Yes, delete forever
          </button>
          <button className="gbtn" onClick={()=>setConfirmPermDelete(false)}>Cancel</button>
        </div>
      </div>
    )}
    <div style={{padding:'0 16px',flex:1,overflowY:'auto'}}>
      <div style={{display:'flex',gap:14,marginBottom:16,alignItems:'flex-start'}}>
        <div style={{width:54,height:74,borderRadius:8,background:'#252d4a',border:'0.5px solid #3a4468',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0,overflow:'hidden'}}>
          {sel.image?<img src={sel.image} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:wineEmoji(sel.wineType)}
        </div>
        <div style={{flex:1}}>
          <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.1em',marginBottom:2}}>{(sel.producer||'').toUpperCase()}</div>
          <div className="di" style={{color:'#f0ead8',fontSize:20,lineHeight:1.2,marginBottom:4}}>{sel.wineName}</div>
          <div style={{color:'#8a96b8',fontSize:11}}>{sel.vintage}{sel.region?` · ${sel.region}`:''}</div>
          {sel.appellation&&<div style={{color:'#5a6480',fontSize:10,marginTop:1}}>{sel.appellation}</div>}
          <div style={{marginTop:6,display:'flex',gap:4,flexWrap:'wrap'}}>
            {(sel.grapeVarieties||[]).map(g=><span key={g} className={pillCls(sel.wineType)}>{g}</span>)}
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div className="sec" style={{marginBottom:0}}>INVENTORY</div>
          <button onClick={()=>{setLogAction('');setLogNotes('');setLogRating(0);setView('log');}}
            style={{background:'#2a1010',border:'0.5px solid #4a2020',color:'#c44a4a',borderRadius:8,padding:'4px 12px',fontSize:11,cursor:'pointer'}}>
            Log a bottle
          </button>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <span className="df" style={{color:'#f0ead8',fontSize:24}}>{sel.bottles}</span>
            <span style={{color:'#5a6480',fontSize:13}}> bottles remaining</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button className="qbtn" onClick={()=>adjustQty(-1)}>−</button>
            <button className="qbtn" onClick={()=>adjustQty(1)}>+</button>
          </div>
        </div>
        {sel.drinkLog?.length>0&&(
          <div style={{marginTop:10,borderTop:'0.5px solid #2d3654',paddingTop:8}}>
            <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.08em',marginBottom:4}}>DRINK LOG</div>
            {sel.drinkLog.slice(0,3).map((l,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{color:'#8a96b8',fontSize:11}}>{l.date} — {l.type==='drank'?'🥂 Drank':l.type==='gave'?'🎁 Gave':'💔 Lost'}</span>
                {l.rating>0&&<span style={{color:'#c4a44a',fontSize:11}}>{'★'.repeat(l.rating)}</span>}
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <div className="card" style={{flex:1,padding:12}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
            <div className="sec" style={{marginBottom:0}}>RETAIL (US)</div>
            {sel.livePriceFetched
              ? <span style={{background:'#0e2318',color:'#4a9e6a',fontSize:9,padding:'2px 6px',borderRadius:8,border:'0.5px solid #1a3d28',letterSpacing:'.04em'}}>LIVE</span>
              : <span style={{background:'#252d4a',color:'#5a6480',fontSize:9,padding:'2px 6px',borderRadius:8,letterSpacing:'.04em'}}>EST.</span>
            }
          </div>
          {sel.priceMedian
            ? <>
                <div className="df" style={{color:'#c4a44a',fontSize:18}}>${sel.priceMedian} <span style={{fontSize:13,color:'#5a6480'}}>typical</span></div>
                <div style={{color:'#5a6480',fontSize:10,marginTop:1}}>${sel.retailPriceLow}–${sel.retailPriceHigh} range</div>
              </>
            : <div className="df" style={{color:'#c4a44a',fontSize:18}}>{sel.retailPriceLow&&sel.retailPriceHigh?`$${sel.retailPriceLow}–$${sel.retailPriceHigh}`:sel.priceMedian?`$${sel.priceMedian}`:'—'}</div>
          }
          {sel.priceSources?.length>0 && <div style={{color:'#5a6480',fontSize:10,marginTop:3}}>{sel.priceListings} listings · {sel.priceSources.slice(0,2).join(', ')}</div>}
          {sel.priceNote&&<div style={{color:'#5a6480',fontSize:10,marginTop:3,fontStyle:'italic'}}>{sel.priceNote}</div>}
        </div>
        <div className="card" style={{flex:1,padding:12}}>
          <div className="sec" style={{marginBottom:4}}>DRINK</div>
          <div className="df" style={{color:'#c47a2a',fontSize:13,marginBottom:5}}>{sel.drinkingWindow?.start}–{sel.drinkingWindow?.end}</div>
          <div className={statusCls(sel.drinkingWindow?.status||'')}>{statusLabel(sel.drinkingWindow?.status)||'—'}</div>
        </div>
      </div>

      <div className="card" style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div className="sec" style={{marginBottom:0}}>MY PURCHASE</div>
          {!editPurchase&&(
            <button onClick={()=>{setDraftPurchasePrice(sel.purchasePrice?String(sel.purchasePrice):'');setDraftPurchaseWhere(sel.purchaseWhere||'');setEditPurchase(true);}}
              style={{background:'none',border:'none',color:'#c4a44a',fontSize:11,cursor:'pointer'}}>
              {sel.purchasePrice||sel.purchaseWhere ? 'Edit' : '+ Add purchase info'}
            </button>
          )}
        </div>
        {editPurchase ? (
          <>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{color:'#5a6480',fontSize:10,marginBottom:4}}>WHAT I PAID ($)</div>
                <input type="number" value={draftPurchasePrice} onChange={e=>setDraftPurchasePrice(e.target.value)}
                  placeholder="e.g. 185" style={{fontSize:13}}/>
              </div>
              <div style={{flex:2}}>
                <div style={{color:'#5a6480',fontSize:10,marginBottom:4}}>WHERE I BOUGHT IT</div>
                <input type="text" value={draftPurchaseWhere} onChange={e=>setDraftPurchaseWhere(e.target.value)}
                  placeholder="e.g. K&L Wines" style={{fontSize:13}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn" style={{padding:'9px'}} onClick={savePurchaseInfo}>Save</button>
              <button className="gbtn" style={{padding:'9px'}} onClick={()=>setEditPurchase(false)}>Cancel</button>
            </div>
          </>
        ) : (sel.purchasePrice||sel.purchaseWhere) ? (
          <div style={{display:'flex',gap:20}}>
            {sel.purchasePrice&&(
              <div>
                <div style={{color:'#5a6480',fontSize:10,marginBottom:2}}>PAID</div>
                <div className="df" style={{color:'#f0ead8',fontSize:18}}>${sel.purchasePrice}</div>
                {sel.priceMedian&&sel.purchasePrice&&(
                  <div style={{color:sel.priceMedian>sel.purchasePrice?'#4a9e6a':'#c44a4a',fontSize:11,marginTop:2}}>
                    {sel.priceMedian>sel.purchasePrice
                      ? `+$${Math.round(sel.priceMedian-sel.purchasePrice)} gain`
                      : `-$${Math.round(sel.purchasePrice-sel.priceMedian)} below market`}
                  </div>
                )}
              </div>
            )}
            {sel.purchaseWhere&&(
              <div>
                <div style={{color:'#5a6480',fontSize:10,marginBottom:2}}>FROM</div>
                <div style={{color:'#f0ead8',fontSize:14}}>{sel.purchaseWhere}</div>
              </div>
            )}
          </div>
        ) : (
          <div style={{color:'#5a6480',fontSize:12,fontStyle:'italic'}}>Tap "+ Add purchase info" to record what you paid and where.</div>
        )}
      </div>

      {sel.tastingNotes&&(
        <div className="card" style={{marginBottom:10}}>
          <div className="sec">TASTING NOTES</div>
          {[['Nose',sel.tastingNotes.nose],['Palate',sel.tastingNotes.palate],['Finish',sel.tastingNotes.finish]].map(([lbl,val])=>val?(
            <div key={lbl} style={{marginBottom:8}}>
              <div style={{color:'#c4a44a',fontSize:11,fontStyle:'italic',marginBottom:2}}>{lbl}</div>
              <div style={{color:'#8a96b8',fontSize:12,lineHeight:1.5}}>{val}</div>
            </div>
          ):null)}
        </div>
      )}

      <div className="card" style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div className="sec" style={{marginBottom:0}}>MY NOTES</div>
          {!editNotes&&<button onClick={()=>{setNotesDraft(sel.myNotes||'');setEditNotes(true);}} style={{background:'none',border:'none',color:'#c4a44a',fontSize:11,cursor:'pointer'}}>Edit</button>}
        </div>
        {editNotes ? <>
          <textarea value={notesDraft} onChange={e=>setNotesDraft(e.target.value)} rows={3} placeholder="Personal tasting notes, occasion, food pairing…" style={{marginBottom:8}}/>
          <div style={{display:'flex',gap:8}}>
            <button className="btn" style={{padding:9}} onClick={saveMyNotes}>Save</button>
            <button className="gbtn" style={{padding:9}} onClick={()=>setEditNotes(false)}>Cancel</button>
          </div>
        </> : <div style={{color:sel.myNotes?'#8a96b8':'#5a6480',fontSize:13,fontStyle:sel.myNotes?'normal':'italic'}}>{sel.myNotes||'Tap Edit to add personal notes…'}</div>}
      </div>

      {sel.cellaring&&(
        <div style={{background:'#251608',border:'0.5px solid #3d2810',borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{color:'#c47a2a',fontSize:10,letterSpacing:'.1em',marginBottom:6}}>CELLARING ADVICE</div>
          <div style={{color:'#e8c4a0',fontSize:12,lineHeight:1.6}}>
            {sel.cellaring.shouldCellar?`Hold ${sel.cellaring.yearsToHold}. `:'Drink now — no need to cellar. '}{sel.cellaring.storageNotes}
          </div>
        </div>
      )}

      {sel.drinkingWindow?.recommendation&&(
        <div className="card" style={{marginBottom:10}}>
          <div className="sec">DRINKING WINDOW</div>
          <div style={{color:'#8a96b8',fontSize:12,lineHeight:1.6}}>{sel.drinkingWindow.recommendation}</div>
        </div>
      )}

      {(sel.servingTemp||sel.decantingAdvice)&&(
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {sel.servingTemp&&<div className="card" style={{flex:1,padding:12}}><div className="sec" style={{marginBottom:4}}>SERVE AT</div><div className="df" style={{color:'#f0ead8',fontSize:16}}>{sel.servingTemp}</div></div>}
          {sel.decantingAdvice&&<div className="card" style={{flex:2,padding:12}}><div className="sec" style={{marginBottom:4}}>DECANT</div><div style={{color:'#8a96b8',fontSize:12,lineHeight:1.4}}>{sel.decantingAdvice}</div></div>}
        </div>
      )}
      <div style={{height:8}}/>
    </div>
  </>, 'cellar');

  // ── LOG ───────────────────────────────────────────────────────────────────
  if (view==='log' && sel) return wrap(<>
    <div style={{padding:'18px 16px 6px',display:'flex',alignItems:'center',gap:10}}>
      <button className="back" onClick={()=>{setLogAction('');setView('detail');}}>←</button>
      <span className="di" style={{color:'#f0ead8',fontSize:18}}>Log a bottle</span>
    </div>
    <div style={{padding:'4px 16px 14px',color:'#8a96b8',fontSize:13}}>
      {sel.producer} {sel.wineName} {sel.vintage} · <span style={{color:'#c4a44a'}}>{sel.bottles} remaining</span>
    </div>
    <div style={{padding:'0 16px',flex:1}}>
      {!logAction ? <>
        <div className="sec">WHAT HAPPENED TO THIS BOTTLE?</div>
        {[
          {key:'drank',icon:'🥂',bg:'#0e2318',bdr:'#1a3d28',label:'Drank it',sub:'Logs date + removes from count'},
          {key:'gave',icon:'🎁',bg:'#162038',bdr:'#1e3060',label:'Gave away',sub:'Gift or shared — removes from count'},
          {key:'lost',icon:'💔',bg:'#251608',bdr:'#3d2810',label:'Lost / broken / corked',sub:'Removes from count, no drink log'},
          {key:'delete',icon:'📦',bg:'#162038',bdr:'#1e3060',label:'Archive this wine',sub:'Moves to archive with full history',danger:false},
          {key:'permdelete',icon:'🗑',bg:'#2a1010',bdr:'#4a2020',label:'Delete permanently',sub:'Removes all data — cannot be undone',danger:true},
        ].map(o=>(
          <div key={o.key} className="lopt" style={{borderColor:o.danger?'#4a2020':'#2d3654'}} onClick={()=>setLogAction(o.key)}>
            <div style={{width:36,height:36,borderRadius:10,background:o.bg,border:`0.5px solid ${o.bdr}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{o.icon}</div>
            <div style={{flex:1}}>
              <div style={{color:o.danger?'#c44a4a':'#f0ead8',fontSize:13,fontWeight:500}}>{o.label}</div>
              <div style={{color:'#5a6480',fontSize:11,marginTop:1}}>{o.sub}</div>
            </div>
            <div style={{color:'#5a6480'}}>›</div>
          </div>
        ))}
      </> : logAction==='permdelete' ? (
        <div className="card" style={{textAlign:'center',padding:28}}>
          <div style={{fontSize:32,marginBottom:12}}>🗑</div>
          <div className="di" style={{color:'#f0ead8',fontSize:20,marginBottom:8}}>Delete permanently?</div>
          <div style={{color:'#8a96b8',fontSize:13,marginBottom:20,lineHeight:1.5}}>
            All data for <em>{sel.wineName}</em> will be permanently deleted with no archive. Cannot be undone.
          </div>
          <button className="dbtn" style={{marginBottom:8}} onClick={confirmLog}>Yes, delete forever</button>
          <button className="gbtn" onClick={()=>setLogAction('')}>Cancel</button>
        </div>
      ) : logAction==='delete' ? (
        <div className="card" style={{textAlign:'center',padding:28}}>
          <div style={{fontSize:32,marginBottom:12}}>🗑</div>
          <div className="di" style={{color:'#f0ead8',fontSize:20,marginBottom:8}}>Archive this wine?</div>
          <div style={{color:'#8a96b8',fontSize:13,marginBottom:20,lineHeight:1.5}}>
            Moves all {sel.bottles} bottle{sel.bottles!==1?'s':''} of <em>{sel.wineName}</em> to your archive with full history intact.
          </div>
          <button className="btn" style={{marginBottom:8}} onClick={confirmLog}>Yes, archive it</button>
          <button className="gbtn" onClick={()=>setLogAction('')}>Cancel</button>
        </div>
      ) : (
        <div className="card">
          <div style={{fontSize:28,textAlign:'center',marginBottom:10}}>{logAction==='drank'?'🥂':'🎁'}</div>

// ─── SETTINGS PANEL ───────────────────────────────────────────────────────────
function SettingsPanel({ profileId, onSwitchProfile }) {
  const { useState } = React;
  const [key, setKey] = useState(getApiKey(profileId));
  const [saved, setSaved] = useState(false);
  const [testing, setTesting] = useState(false);
  const [keyErr, setKeyErr] = useState('');

  async function saveKey() {
    setTesting(true); setKeyErr('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
      });
      if (!res.ok) { const t=await res.text(); throw new Error('Key rejected: '+t.slice(0,100)); }
      store.set(`cave_key_${profileId}`, key.trim());
      store.set('cave_api_key', key.trim());
      setSaved(true); setTimeout(()=>setSaved(false),1500);
    } catch(e) { setKeyErr(e.message); } finally { setTesting(false); }
  }

  function importCSV(e) {
    const file = e.target.files?.[0]; e.target.value='';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const lines = reader.result.split('\n').filter(function(l){ return l.trim(); });
      if (lines.length < 2) { alert('CSV appears empty'); return; }
      const headers = lines[0].split(',').map(function(h){ return h.replace(/^"|"$/g,'').trim(); });
      const get = function(row, name) {
        const i = headers.findIndex(function(h){ return h.toLowerCase()===name.toLowerCase(); });
        if (i < 0) return '';
        const v = row[i] || '';
        return v.replace(/^"|"$/g,'').trim();
      };

      // Parse all rows synchronously — no await inside loop
      const toSave = [];
      let skipped = 0;
      for (let li = 1; li < lines.length; li++) {
        const row = lines[li].match(/("(?:[^"]|"")*"|[^,]*)/g) || [];
        const producer = get(row,'Producer');
        const wineName = get(row,'Wine Name');
        if (!producer && !wineName) continue;
        const vintage = get(row,'Vintage') || 'NV';
        const alreadyExists = cellar.find(function(w){
          return w.producer===producer && w.wineName===wineName && w.vintage===vintage;
        });
        if (alreadyExists) { skipped++; continue; }
        const rawStatus = get(row,'Drink Status') || get(row,'Status') || 'hold';
        const wine = {
          id: String(Date.now() + li),
          producer, wineName, vintage,
          region: get(row,'Region'),
          appellation: get(row,'Appellation'),
          grapeVarieties: get(row,'Grape Varieties').split(';').map(function(s){ return s.trim(); }).filter(Boolean),
          wineType: get(row,'Type') || 'red',
          bottles: parseInt(get(row,'Bottles')) || 1,
          retailPriceLow: parseFloat(get(row,'Retail Low')) || null,
          retailPriceHigh: parseFloat(get(row,'Retail High')) || null,
          priceMedian: parseFloat(get(row,'Retail Median')) || null,
          priceNote: 'Imported from CSV',
          livePriceFetched: false,
          purchasePrice: parseFloat(get(row,'Purchase Price')) || null,
          purchaseWhere: get(row,'Purchase Where') || null,
          purchaseDate: get(row,'Purchase Date') || get(row,'Added Date') || null,
          drinkingWindow: {
            status: normalizeStatus(rawStatus),
            start: get(row,'Drink Window Start'),
            end: get(row,'Drink Window End'),
            recommendation: get(row,'Drinking Window Note')
          },
          cellaring: {
            shouldCellar: normalizeStatus(rawStatus) === 'hold',
            yearsToHold: get(row,'Cellar Years'),
            storageNotes: ''
          },
          tastingNotes: {
            nose: get(row,'Nose'),
            palate: get(row,'Palate'),
            finish: get(row,'Finish')
          },
          servingTemp: get(row,'Serving Temp'),
          decantingAdvice: get(row,'Decanting'),
          myNotes: get(row,'My Notes') || '',
          image: '',
          addedAt: Date.now() + li,
          drinkLog: []
        };
        toSave.push(wine);
      }

      // Save all wines in parallel with Promise.all — no async generator
      const saves = toSave.map(function(wine) {
        return window.storage.set('wine:' + wine.id, JSON.stringify(wine));
      });
      const imported = toSave.length;
      Promise.all(saves).then(function() {
        return loadCellar();
      }).then(function() {
        alert(imported + ' wine' + (imported !== 1 ? 's' : '') + ' imported' +
              (skipped ? ', ' + skipped + ' skipped (already in cave)' : '') + '.');
      }).catch(function(err) {
        alert('Import failed: ' + err.message);
      });
    };
    reader.readAsText(file);
  }

  function exportCSV() {
    const prefix = getProfilePrefix(profileId);
    const keys = store.keys(prefix + 'wine:');
    const wines = keys.map(k => {
      try { return JSON.parse(store.get(k)); } catch { return null; }
    }).filter(Boolean);

    const headers = [
      'Producer','Wine Name','Vintage','Region','Appellation','Grape Varieties','Type',
      'Bottles','Retail Low','Retail High','Retail Median','Purchase Price','Purchase Where','Purchase Date',
      'Drink Status','Drink Window Start','Drink Window End','Drinking Window Note',
      'Cellar Years','Serving Temp','Decanting',
      'Nose','Palate','Finish','My Notes','Added Date'
    ];

    const rows = wines.map(w => [
      w.producer||'', w.wineName||'', w.vintage||'', w.region||'', w.appellation||'',
      (w.grapeVarieties||[]).join('; '), w.wineType||'',
      w.bottles||0, w.retailPriceLow||'', w.retailPriceHigh||'', w.priceMedian||'',
      w.purchasePrice||'', w.purchaseWhere||'', w.purchaseDate||'',
      w.drinkingWindow?.status||'', w.drinkingWindow?.start||'', w.drinkingWindow?.end||'',
      (w.drinkingWindow?.recommendation||'').replace(/,/g,' '),
      (w.cellaring?.yearsToHold||'').replace(/,/g,' '),
      w.servingTemp||'', (w.decantingAdvice||'').replace(/,/g,' '),
      (w.tastingNotes?.nose||'').replace(/,/g,' '),
      (w.tastingNotes?.palate||'').replace(/,/g,' '),
      (w.tastingNotes?.finish||'').replace(/,/g,' '),
      (w.myNotes||'').replace(/,/g,' '),
      w.addedAt ? new Date(w.addedAt).toLocaleDateString() : ''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`));

    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `cave-cellar-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function clearData() {
    if (!confirm('Delete ALL wine data for this profile? This cannot be undone.')) return;
    const prefix = getProfilePrefix(profileId);
    store.keys(prefix+'wine:').forEach(k=>store.del(k));
    window.location.reload();
  }

  const isPwaInstalled = isPWA();

  return (
    <>
      {!isPwaInstalled&&(
        <div style={{background:'#251f0e',border:'0.5px solid #3d3015',borderRadius:14,padding:16,marginBottom:14}}>
          <div style={{color:'#c4a44a',fontSize:13,fontWeight:600,marginBottom:6}}>📲 Install Cave for data persistence</div>
          <div style={{color:'#8a7a50',fontSize:12,lineHeight:1.6,marginBottom:10}}>
            In Safari: tap the <strong style={{color:'#c4a44a'}}>Share button</strong> → <strong style={{color:'#c4a44a'}}>Add to Home Screen</strong>. This prevents Safari from clearing your data.
          </div>
          <div style={{color:'#5a6480',fontSize:11}}>Currently running in browser — data may not persist.</div>
        </div>
      )}
      {isPwaInstalled&&(
        <div style={{background:'#0e2318',border:'0.5px solid #1a3d28',borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{color:'#4a9e6a',fontSize:13,fontWeight:600}}>✓ Installed as PWA — data persists</div>
        </div>
      )}

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">API KEY</div>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} style={{marginBottom:8}}/>
        {keyErr&&<div className="err" style={{marginBottom:8}}>{keyErr}</div>}
        <button onClick={saveKey} disabled={!key.trim()||testing}
          style={{background:saved?'#0e2318':(!key.trim()||testing)?'#252d4a':'#c4a44a',color:saved?'#4a9e6a':(!key.trim()||testing)?'#5a6480':'#0f0c05',border:'none',borderRadius:10,padding:12,fontSize:13,fontWeight:600,cursor:'pointer',width:'100%'}}>
          {testing?'Verifying…':saved?'✓ Saved':'Update API key'}
        </button>
        <div style={{color:'#5a6480',fontSize:11,marginTop:8,lineHeight:1.6}}>
          Get a key at <a href="https://console.anthropic.com/keys" target="_blank" style={{color:'#c4a44a'}}>console.anthropic.com/keys</a>
        </div>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">PROFILES</div>
        <div style={{color:'#8a96b8',fontSize:13,marginBottom:10}}>Switch profile or add a new one — perfect for sharing Cave with someone else.</div>
        <button className="gbtn" onClick={onSwitchProfile} style={{marginBottom:8}}>Switch / manage profiles</button>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div className="sec">DATA</div>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <button onClick={exportCSV} className="gbtn" style={{flex:1}}>⬇ Export CSV</button>
          <label style={{flex:1,cursor:'pointer'}}>
            <div className="gbtn" style={{textAlign:'center'}}>⬆ Import CSV</div>
            <input type="file" accept=".csv" onChange={e=>importCSV(e)} style={{opacity:0,position:'fixed',top:-100,left:-100,width:1,height:1}}/>
          </label>
        </div>
        <div style={{color:'#5a6480',fontSize:11,marginBottom:10,lineHeight:1.5}}>
          Import wines from a Cave CSV export. Duplicates (same producer + name + vintage) are skipped.
        </div>
        <button onClick={clearData} className="dbtn">Clear all data for this profile</button>
      </div>

      <div style={{color:'#5a6480',fontSize:11,textAlign:'center',padding:'8px 0'}}>Cave v2.0</div>
    </>
  );
}

// ─── PROFILE SELECT SCREEN ────────────────────────────────────────────────────
function ProfileSelect({ onSelect }) {
  const { useState } = React;
  const profiles = getProfiles();
  const [newName, setNewName] = useState('');
  const [newKey, setNewKey] = useState('');
  const [creating, setCreating] = useState(profiles.length === 0);
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  async function handleCreate() {
    if (!newName.trim()) { setErr('Enter a name.'); return; }
    if (!newKey.trim().startsWith('sk-ant-')) { setErr('Key should start with sk-ant-'); return; }
    setBusy(true); setErr('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':newKey.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
      });
      if (!res.ok) { const t=await res.text(); throw new Error('Key rejected: '+t.slice(0,100)); }
      const id = createProfile(newName.trim(), newKey.trim());
      store.set('cave_api_key', newKey.trim());
      onSelect(id, newName.trim());
    } catch(e) { setErr(e.message); } finally { setBusy(false); }
  }

  return (
    <div style={{background:'#161c2e',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',maxWidth:440,margin:'0 auto'}}>
      <style>{CSS}</style>
      <div style={{fontSize:52,marginBottom:16}}>🍷</div>
      <div className="di" style={{color:'#f0ead8',fontSize:34,marginBottom:6}}>Cave</div>
      <div style={{color:'#5a6480',fontSize:13,marginBottom:32}}>Your personal wine cellar</div>

      {!creating && profiles.length > 0 ? (
        <div style={{width:'100%'}}>
          <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.1em',marginBottom:10}}>SELECT PROFILE</div>
          {profiles.map(p=>(
            <button key={p.id} onClick={()=>onSelect(p.id, p.name)}
              style={{width:'100%',background:'#1e2640',border:'0.5px solid #2d3654',borderRadius:12,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',marginBottom:8,textAlign:'left'}}>
              <div style={{width:38,height:38,borderRadius:'50%',background:'#252d4a',border:'0.5px solid #3a4468',display:'flex',alignItems:'center',justifyContent:'center',color:'#c4a44a',fontSize:16,fontWeight:600,flexShrink:0}}>
                {p.name.charAt(0).toUpperCase()}
              </div>
              <div>
                <div style={{color:'#f0ead8',fontSize:15,fontWeight:500}}>{p.name}</div>
                <div style={{color:'#5a6480',fontSize:11,marginTop:2}}>Cave profile</div>
              </div>
              <div style={{marginLeft:'auto',color:'#c4a44a',fontSize:18}}>›</div>
            </button>
          ))}
          <button className="gbtn" style={{marginTop:8}} onClick={()=>setCreating(true)}>+ Add new profile</button>
        </div>
      ) : (
        <div style={{width:'100%',background:'#1e2640',border:'0.5px solid #2d3654',borderRadius:16,padding:24}}>
          <div style={{color:'#f0ead8',fontSize:16,fontWeight:500,marginBottom:16}}>
            {profiles.length===0 ? 'Create your profile' : 'New profile'}
          </div>
          <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.08em',marginBottom:5}}>YOUR NAME</div>
          <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Alok" style={{marginBottom:12}}/>
          <div style={{color:'#5a6480',fontSize:10,letterSpacing:'.08em',marginBottom:5}}>ANTHROPIC API KEY</div>
          <input type="password" value={newKey} onChange={e=>setNewKey(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleCreate()} placeholder="sk-ant-api03-..." style={{marginBottom:8}}/>
          <div style={{color:'#5a6480',fontSize:11,marginBottom:14,lineHeight:1.7}}>
            Get key at <a href="https://console.anthropic.com/keys" target="_blank" style={{color:'#c4a44a'}}>console.anthropic.com/keys</a>. Stored only on this device.
          </div>
          {err&&<div className="err" style={{marginBottom:12}}>{err}</div>}
          <button className="btn" onClick={handleCreate} disabled={!newName.trim()||!newKey.trim()||busy}>
            {busy?'Verifying…':'Create profile & open Cave'}
          </button>
          {profiles.length>0&&<button className="gbtn" style={{marginTop:8}} onClick={()=>setCreating(false)}>Cancel</button>}
        </div>
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const { useState } = React;
  const [profileId, setProfileId] = useState(() => {
    const id = getCurrentProfileId();
    const profiles = getProfiles();
    if (id && profiles.find(p=>p.id===id)) return id;
    if (profiles.length===1) return profiles[0].id;
    return '';
  });
  const [profileName, setProfileName] = useState(() => {
    const id = getCurrentProfileId();
    const profiles = getProfiles();
    const p = profiles.find(x=>x.id===id);
    return p ? p.name : '';
  });

  function handleSelect(id, name) {
    setCurrentProfileId(id);
    buildStorage(id);
    setProfileId(id);
    setProfileName(name);
  }

  function handleSwitch() {
    setProfileId('');
    setProfileName('');
  }

  if (!profileId) {
    return <ProfileSelect onSelect={handleSelect}/>;
  }

  return <Cave profileId={profileId} profileName={profileName} onSwitchProfile={handleSwitch}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  
  
  </script>
</body>
