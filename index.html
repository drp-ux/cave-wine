// ─── localStorage storage adapter (mirrors window.storage API) ───────────────
window.storage = {
  async list(prefix) {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
    return { keys };
  },
  async get(key) {
    const val = localStorage.getItem(key);
    if (val === null) throw new Error('Not found: ' + key);
    return { value: val };
  },
  async set(key, value) {
    localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true };
  }
};

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',

      'Content-Type': 'application/json',

  try { data = JSON.parse(raw); } catch(e) { throw new Error('Non-JSON: ' + raw.slice(0, 150)); }
  if (data.error) throw new Error(JSON.stringify(data.error).slice(0, 200));

  return txt;
}
